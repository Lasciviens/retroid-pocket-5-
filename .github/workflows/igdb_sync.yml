name: IGDB Screenshots Sync

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync IGDB screenshots, keywords and genres
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, time

          SB = 'https://bniqmxbtvgwkaoswugds.supabase.co'
          AK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuaXFteGJ0dmd3a2Fvc3d1Z2RzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTExMTYsImV4cCI6MjA5MzQyNzExNn0.VXjnGv3uV8A2XfAW5jOBAkxyzc9c9q6adrA64JfwrQs'
          SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuaXFteGJ0dmd3a2Fvc3d1Z2RzIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Nzg1MTExNiwiZXhwIjoyMDkzNDI3MTE2fQ.j7fQEewwxb_IRicNOmYTwsEJONvHbrj3TvqGyNozVwM'
          P = SB + '/functions/v1/igdb-search'

          # IGDB genre ID -> bizim DB genre adı mapping
          IGDB_GENRE_MAP = {
            2: 'Platformer',
            4: 'Fighting',
            5: 'Shooter',
            7: 'Puzzle',
            8: 'Racing',
            9: 'RPG',
            10: 'Strategy',
            11: 'Sports',
            12: 'RPG',
            14: 'Sports',
            15: 'Strategy',
            16: 'Platformer',
            24: 'Action',
            25: 'Action',
            26: 'Action',
            31: 'Action-Adventure',
            32: 'Action-Adventure',
            33: 'Action-Adventure',
            34: 'FPS',
            35: 'FPS',
          }

          # Bizim DB'deki genre adı -> id
          r = urllib.request.Request(SB+'/rest/v1/genres?select=id,name&limit=50', headers={'apikey':AK,'Authorization':'Bearer '+AK})
          with urllib.request.urlopen(r) as x:
              our_genres = {g['name']: g['id'] for g in json.load(x)}
          print('Bizim genres:', list(our_genres.keys()))

          def nc(url):
              if not url: return ''
              return (url if not url.startswith('//') else 'https:'+url).replace('/t_thumb/','/t_cover_big/')

          def get_games(offset, limit=50):
              r = urllib.request.Request(
                  SB+'/rest/v1/games?select=id,title,external_id&external_id=not.is.null&order=title&limit='+str(limit)+'&offset='+str(offset),
                  headers={'apikey':AK,'Authorization':'Bearer '+AK})
              with urllib.request.urlopen(r) as x: return json.load(x)

          def igdb_fetch(igdb_id):
              with urllib.request.urlopen(urllib.request.Request(
                  P+'?id='+str(igdb_id), headers={'apikey':AK,'Authorization':'Bearer '+AK}), timeout=8) as x:
                  return (json.load(x).get('results') or [None])[0]

          def patch_game(gid, payload):
              with urllib.request.urlopen(urllib.request.Request(
                  SB+'/rest/v1/games?id=eq.'+gid,
                  data=json.dumps(payload).encode(), method='PATCH',
                  headers={'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'})) as x: return x.status

          def get_existing_genres(game_id):
              r = urllib.request.Request(
                  SB+'/rest/v1/game_genres?select=genre_id&game_id=eq.'+game_id,
                  headers={'apikey':AK,'Authorization':'Bearer '+AK})
              with urllib.request.urlopen(r) as x: return {row['genre_id'] for row in json.load(x)}

          def insert_genre(game_id, genre_id):
              with urllib.request.urlopen(urllib.request.Request(
                  SB+'/rest/v1/game_genres',
                  data=json.dumps({'game_id':game_id,'genre_id':genre_id}).encode(), method='POST',
                  headers={'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'})) as x: return x.status

          offset = 0
          total_ss = total_genre = 0
          while True:
              games = get_games(offset)
              if not games: break
              for g in games:
                  try:
                      d = igdb_fetch(g['external_id'])
                      if not d: continue

                      # Screenshots
                      ss = [nc(s.get('url','')) for s in (d.get('screenshots') or []) if s.get('url')][:10]
                      kw = [k.get('name','') for k in (d.get('keywords') or []) if k.get('name')][:20]
                      patch = {}
                      if ss: patch['screenshots'] = ss
                      if kw: patch['keywords'] = kw
                      if patch:
                          patch_game(g['id'], patch)
                          total_ss += 1

                      # Genres — IGDB'den gelen genre listesi
                      igdb_genres = d.get('genres') or []
                      existing = get_existing_genres(g['id'])
                      added = 0
                      for ig in igdb_genres:
                          # IGDB id'sine göre mapping
                          our_name = IGDB_GENRE_MAP.get(ig.get('id'))
                          if not our_name:
                              # İsim bazlı deneme
                              ig_name = ig.get('name','').lower()
                              if 'hack' in ig_name or 'beat' in ig_name or 'action' in ig_name: our_name = 'Action'
                              elif 'rpg' in ig_name or 'role' in ig_name: our_name = 'RPG'
                              elif 'platform' in ig_name: our_name = 'Platformer'
                              elif 'racing' in ig_name or 'sport' in ig_name: our_name = 'Racing'
                              elif 'strategy' in ig_name or 'tactical' in ig_name: our_name = 'Strategy'
                              elif 'puzzle' in ig_name: our_name = 'Puzzle'
                              elif 'fight' in ig_name: our_name = 'Fighting'
                              elif 'shoot' in ig_name or 'fps' in ig_name: our_name = 'FPS'
                              elif 'adventure' in ig_name: our_name = 'Action-Adventure'
                              elif 'horror' in ig_name or 'survival' in ig_name: our_name = 'Survival Horror'
                              elif 'stealth' in ig_name: our_name = 'Stealth'
                          if our_name and our_name in our_genres:
                              gid = our_genres[our_name]
                              if gid not in existing:
                                  insert_genre(g['id'], gid)
                                  existing.add(gid)
                                  added += 1
                      if added: total_genre += 1
                      time.sleep(0.15)
                  except Exception as e:
                      print(f'ERR {g["title"]}: {e}')
              print(f'offset={offset}: {len(games)} oyun islendi')
              offset += 50
              if len(games) < 50: break

          print(f'TOPLAM ss={total_ss} genre={total_genre}')
          PYEOF
