<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Cover Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--bg-1:#0a0e1a;--bg-2:#131829;--bg-3:#1c2238;--accent:#00d4ff;--text:#e8eaf0;--muted:#8c93a8;--border:#2a3149;--good:#2ecc71;--warn:#f39c12;--bad:#e74c3c}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg-1);color:var(--text);min-height:100vh;padding:20px}
header{text-align:center;margin-bottom:24px;padding:20px;background:linear-gradient(135deg,rgba(0,212,255,.1),rgba(255,70,85,.1));border:1px solid var(--border);border-radius:16px}
h1{font-size:1.6rem;font-weight:800;color:var(--accent);margin-bottom:4px}
.subtitle{color:var(--muted);font-size:.85rem}
.quick-links{display:flex;justify-content:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.quick-links a{background:var(--bg-3);border:1px solid var(--border);color:var(--accent);padding:6px 12px;border-radius:8px;text-decoration:none;font-size:.8rem;font-weight:600}

/* LAYOUT */
.main{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1100px;margin:0 auto}
@media(max-width:700px){.main{grid-template-columns:1fr}}

/* SOL: oyun listesi */
.panel{background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:16px}
.panel-title{font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.search-input{width:100%;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:.85rem;margin-bottom:10px}
.search-input:focus{outline:none;border-color:var(--accent)}
.game-list{display:flex;flex-direction:column;gap:4px;max-height:520px;overflow-y:auto}
.game-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.game-row:hover{background:var(--bg-3);border-color:var(--border)}
.game-row.selected{background:rgba(0,212,255,.1);border-color:var(--accent)}
.game-row img{width:32px;height:44px;object-fit:cover;border-radius:4px;flex-shrink:0}
.game-row-fb{width:32px;height:44px;background:var(--bg-3);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--muted);flex-shrink:0}
.game-row-info{flex:1;min-width:0}
.game-row-title{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-row-sys{font-size:.7rem;color:var(--muted)}
.no-cover-dot{width:8px;height:8px;border-radius:50%;background:var(--bad);flex-shrink:0}
.has-cover-dot{width:8px;height:8px;border-radius:50%;background:var(--good);flex-shrink:0}

/* SAĞ: test paneli */
.test-area{display:flex;flex-direction:column;gap:12px}
.selected-title{font-size:1rem;font-weight:700;color:var(--accent);min-height:24px}
.url-input{width:100%;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:.82rem;font-family:monospace}
.url-input:focus{outline:none;border-color:var(--accent)}
.preview-box{background:var(--bg-3);border:1px solid var(--border);border-radius:10px;height:280px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.preview-box img{max-height:100%;max-width:100%;object-fit:contain}
.preview-fb{color:var(--muted);font-size:.85rem;text-align:center;padding:20px}
.status-bar{font-size:.78rem;padding:6px 10px;border-radius:6px;text-align:center;font-weight:600}
.status-bar.ok{background:rgba(46,204,113,.15);color:var(--good);border:1px solid rgba(46,204,113,.3)}
.status-bar.err{background:rgba(231,76,60,.15);color:var(--bad);border:1px solid rgba(231,76,60,.3)}
.status-bar.loading{background:rgba(0,212,255,.1);color:var(--accent);border:1px solid rgba(0,212,255,.3)}
.status-bar.idle{background:var(--bg-3);color:var(--muted);border:1px solid var(--border)}
.btn-row{display:flex;gap:8px}
.btn{border:none;border-radius:8px;padding:10px 18px;font-size:.85rem;cursor:pointer;font-weight:700;transition:all .2s;flex:1}
.btn-save{background:var(--good);color:#0a0e1a}
.btn-save:disabled{opacity:.4;cursor:not-allowed}
.btn-clear{background:var(--bg-3);border:1px solid var(--border);color:var(--text)}
.current-cover{display:flex;align-items:center;gap:8px;font-size:.75rem;color:var(--muted)}
.current-cover img{width:24px;height:33px;object-fit:cover;border-radius:3px}
.saved-flash{display:none;font-size:.8rem;color:var(--good);font-weight:700;text-align:center}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="rp5_auth.js"></script>
</head>
<body>
<header>
  <h1>🖼️ COVER TEST</h1>
  <p class="subtitle">Oyun seç → URL yaz → önizle → beğenince kaydet</p>
  <div class="quick-links">
    <a href="index.html">🏠 Hub</a>
    <a href="Retroid_Library_Dashboard.html">📚 Kütüphane</a>
    <a href="admin.html">⚙️ Admin</a>
  </div>
</header>

<div class="main">
  <!-- SOL: Oyun listesi -->
  <div class="panel">
    <div class="panel-title">Oyunlar <span id="count" style="color:var(--accent)"></span></div>
    <input class="search-input" id="search" placeholder="🔍 Ara..." oninput="filterList()">
    <div class="filter-row" style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">
      <button class="btn btn-clear" style="flex:0;font-size:.7rem;padding:4px 10px" onclick="showAll()">Tümü</button>
      <button class="btn btn-clear" style="flex:0;font-size:.7rem;padding:4px 10px;color:var(--bad)" onclick="showMissing()">⚠️ Cover Eksik</button>
      <button class="btn btn-clear" style="flex:0;font-size:.7rem;padding:4px 10px;color:var(--warn)" onclick="showGameLog()">📝 Game Log Dolu</button>
    </div>
    <div class="game-list" id="game-list"></div>
  </div>

  <!-- SAĞ: Test paneli -->
  <div class="panel test-area">
    <div class="panel-title">Önizleme</div>
    <div class="selected-title" id="selected-title">← Soldaki listeden oyun seç</div>

    <div class="current-cover" id="current-cover" style="display:none">
      <span>Mevcut:</span>
      <img id="current-img" src="" onerror="this.style.display='none'">
      <span id="current-url" style="font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px"></span>
    </div>

    <input class="url-input" id="url-input" placeholder="https://... URL buraya yaz veya yapıştır"
      oninput="onUrlInput()" onpaste="setTimeout(onUrlInput,50)">

    <div class="preview-box" id="preview-box">
      <div class="preview-fb" id="preview-fb">URL gir, görüntü burada çıkar</div>
      <img id="preview-img" src="" style="display:none"
        onload="imgOk()" onerror="imgErr()">
    </div>

    <div class="status-bar idle" id="status">URL bekleniyor</div>

    <div class="btn-row">
      <button class="btn btn-save" id="btn-save" disabled onclick="saveUrl()">💾 Kaydet</button>
      <button class="btn btn-clear" onclick="clearInput()">✕ Temizle</button>
    </div>
    <div class="saved-flash" id="saved-flash">✅ Kaydedildi!</div>
  </div>
</div>

<script>
const SB='https://bniqmxbtvgwkaoswugds.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuaXFteGJ0dmd3a2Fvc3d1Z2RzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTExMTYsImV4cCI6MjA5MzQyNzExNn0.VXjnGv3uV8A2XfAW5jOBAkxyzc9c9q6adrA64JfwrQs';
const H={headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json'}};

let ALL=[], filtered=[], selected=null, imgReady=false;

async function load(){
  const r=await fetch(`${SB}/rest/v1/games?select=id,title,primary_cover_url,game_log,game_platforms(systems(name))&order=title`,{headers:{apikey:KEY,Authorization:`Bearer ${KEY}`}});
  ALL=await r.json();
  filtered=[...ALL];
  renderList();
}

function renderList(){
  const el=document.getElementById('game-list');
  document.getElementById('count').textContent=`(${filtered.length})`;
  el.innerHTML=filtered.map(g=>{
    const sys=g.game_platforms?.map(p=>p.systems?.name).filter(Boolean).join(', ')||'?';
    const hasCover=!!g.primary_cover_url;
    const isSelected=selected?.id===g.id;
    return`<div class="game-row${isSelected?' selected':''}" onclick="selectGame('${g.id}')">
      ${hasCover
        ?`<img src="${g.primary_cover_url}" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="game-row-fb" style="display:none">?</div>`
        :`<div class="game-row-fb">?</div>`}
      <div class="game-row-info">
        <div class="game-row-title">${g.title}</div>
        <div class="game-row-sys">${sys}${g.game_log?` · <span style="color:var(--warn)">${g.game_log}</span>`:''}</div>
      </div>
      <div class="${hasCover?'has-cover-dot':'no-cover-dot'}"></div>
    </div>`;
  }).join('');
}

function filterList(){
  const q=document.getElementById('search').value.toLowerCase();
  filtered=ALL.filter(g=>g.title.toLowerCase().includes(q));
  renderList();
}
function showAll(){filtered=[...ALL];document.getElementById('search').value='';renderList();}
function showMissing(){filtered=ALL.filter(g=>!g.primary_cover_url);document.getElementById('search').value='';renderList();}
function showGameLog(){filtered=ALL.filter(g=>g.game_log&&g.game_log.trim()!=='');document.getElementById('search').value='';renderList();}

function selectGame(id){
  selected=ALL.find(g=>g.id===id);
  if(!selected)return;
  document.getElementById('selected-title').textContent=selected.title;
  // Mevcut cover göster
  const cc=document.getElementById('current-cover');
  if(selected.primary_cover_url){
    cc.style.display='flex';
    document.getElementById('current-img').src=selected.primary_cover_url;
    document.getElementById('current-url').textContent=selected.primary_cover_url;
  } else {
    cc.style.display='none';
  }
  // Input'u temizle
  clearInput();
  renderList();
}

function onUrlInput(){
  const url=document.getElementById('url-input').value.trim();
  if(!url){
    setStatus('idle','URL bekleniyor');
    document.getElementById('preview-img').style.display='none';
    document.getElementById('preview-fb').style.display='flex';
    document.getElementById('btn-save').disabled=true;
    return;
  }
  setStatus('loading','Yükleniyor...');
  imgReady=false;
  document.getElementById('btn-save').disabled=true;
  document.getElementById('preview-fb').style.display='none';
  const img=document.getElementById('preview-img');
  img.style.display='block';
  img.src=url;
}

function imgOk(){
  imgReady=true;
  setStatus('ok','✅ Görüntü yüklendi — kaydedebilirsin');
  if(selected) document.getElementById('btn-save').disabled=false;
}
function imgErr(){
  imgReady=false;
  setStatus('err','❌ Görüntü yüklenemedi — URL geçersiz veya erişilemiyor');
  document.getElementById('btn-save').disabled=true;
}

function setStatus(type,msg){
  const el=document.getElementById('status');
  el.className='status-bar '+type;
  el.textContent=msg;
}

async function saveUrl(){
  if(!selected||!imgReady)return;
  const url=document.getElementById('url-input').value.trim();
  document.getElementById('btn-save').disabled=true;
  setStatus('loading','Kaydediliyor...');
  await fetch(`${SB}/rest/v1/games?id=eq.${selected.id}`,{
    method:'PATCH',
    headers:{...H.headers,Prefer:'return=minimal'},
    body:JSON.stringify({primary_cover_url:url})
  });
  // Local state güncelle
  selected.primary_cover_url=url;
  const g=ALL.find(x=>x.id===selected.id);
  if(g) g.primary_cover_url=url;
  // UI
  setStatus('ok','✅ Kaydedildi!');
  document.getElementById('current-cover').style.display='flex';
  document.getElementById('current-img').src=url;
  document.getElementById('current-url').textContent=url;
  const flash=document.getElementById('saved-flash');
  flash.style.display='block';
  setTimeout(()=>flash.style.display='none',2000);
  clearInput();
  renderList();
}

function clearInput(){
  document.getElementById('url-input').value='';
  document.getElementById('preview-img').style.display='none';
  document.getElementById('preview-fb').style.display='flex';
  document.getElementById('preview-fb').textContent='URL gir, görüntü burada çıkar';
  setStatus('idle','URL bekleniyor');
  document.getElementById('btn-save').disabled=true;
  imgReady=false;
}

window.rp5Auth.lockAdminPage({
  title:'Yonetici girisi gerekli',
  message:'Cover Test sayfasi yazma yaptigi icin sadece yonetici oturumuyla acilir.'
}).then(function(ok){
  if(ok) load();
});
</script>
</body>
</html>
