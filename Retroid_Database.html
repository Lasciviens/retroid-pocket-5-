<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Database — Retroid RP5</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--bg-1:#0a0e1a;--bg-2:#131829;--bg-3:#1c2238;--bg-4:#222840;--accent:#00d4ff;--accent2:#ff4655;--gold:#ffb347;--good:#2ecc71;--warn:#f39c12;--bad:#e74c3c;--text:#e8eaf0;--muted:#8c93a8;--border:#2a3149}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg-1);color:var(--text);min-height:100vh}

/* HEADER */
.topbar{background:var(--bg-2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.topbar h1{font-size:1.1rem;font-weight:800;color:var(--accent);flex-shrink:0}
.topbar-links{display:flex;gap:8px;margin-left:auto}
.topbar-links a{color:var(--muted);text-decoration:none;font-size:.8rem;padding:4px 8px;border-radius:6px;border:1px solid var(--border)}
.topbar-links a:hover{border-color:var(--accent);color:var(--accent)}

/* TOOLBAR */
.toolbar{padding:12px 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);background:var(--bg-2)}
.search-box{background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:.85rem;width:220px}
.search-box:focus{outline:none;border-color:var(--accent)}
select.filter{background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:.8rem;cursor:pointer}
select.filter:focus{outline:none;border-color:var(--accent)}
.btn{border:none;border-radius:8px;padding:7px 14px;font-size:.8rem;cursor:pointer;font-weight:700;transition:all .15s;display:flex;align-items:center;gap:5px}
.btn-accent{background:var(--accent);color:#0a0e1a}
.btn-ghost{background:var(--bg-3);border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.3);color:var(--bad)}
.btn-good{background:rgba(46,204,113,.15);border:1px solid rgba(46,204,113,.3);color:var(--good)}
.count-badge{font-size:.75rem;color:var(--muted);padding:4px 8px;background:var(--bg-3);border-radius:6px;border:1px solid var(--border)}
.copy-all-btn{margin-left:auto}

/* TABLE */
.table-wrap{overflow-x:auto;padding:0 20px 20px}
table{width:100%;border-collapse:collapse;margin-top:16px;font-size:.82rem}
thead th{background:var(--bg-3);color:var(--muted);padding:10px 12px;text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--accent)}
thead th.sorted{color:var(--accent)}
thead th.sorted::after{content:' ↓';font-size:.65rem}
thead th.sorted.asc::after{content:' ↑'}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--bg-3)}
tbody tr.selected{background:rgba(0,212,255,.07);border-left:2px solid var(--accent)}
td{padding:9px 12px;vertical-align:middle}
td.cover-cell{width:40px;padding:6px 12px}
td.cover-cell img{width:32px;height:44px;object-fit:cover;border-radius:4px;display:block}
td.cover-cell .no-cover{width:32px;height:44px;background:var(--bg-3);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--muted)}
.title-cell{font-weight:600;max-width:200px}
.title-cell .series-sub{font-size:.7rem;color:var(--muted);font-weight:400;margin-top:1px}
.badge{display:inline-block;font-size:.62rem;padding:2px 6px;border-radius:4px;font-weight:700;margin-right:2px}
.badge-sys{background:var(--bg-4);color:var(--muted);border:1px solid var(--border)}
.badge-genre{background:rgba(0,212,255,.1);color:var(--accent);border:1px solid rgba(0,212,255,.2)}
.badge-coop{background:rgba(46,204,113,.15);color:var(--good);border:1px solid rgba(46,204,113,.2)}
.badge-iconic{background:rgba(255,179,71,.15);color:var(--gold);border:1px solid rgba(255,179,71,.2)}
.perf-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.perf-good{background:var(--good)}
.perf-warn{background:var(--warn)}
.perf-bad{background:var(--bad)}
.status-pill{font-size:.7rem;padding:2px 7px;border-radius:10px;font-weight:700}
.status-backlog{background:rgba(140,147,168,.15);color:var(--muted)}
.status-playing{background:rgba(243,156,18,.2);color:var(--warn)}
.status-completed{background:rgba(46,204,113,.2);color:var(--good)}
.status-dropped{background:rgba(231,76,60,.15);color:var(--bad)}
.status-wishlist{background:rgba(168,85,247,.2);color:#a855f7}
.action-cell{white-space:nowrap;display:flex;gap:4px}
.icon-btn{background:var(--bg-3);border:1px solid var(--border);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:.75rem;color:var(--text);transition:all .15s}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.icon-btn.del:hover{border-color:var(--bad);color:var(--bad)}

/* INLINE EDIT */
.editable{cursor:pointer;border-bottom:1px dashed transparent;transition:border .15s;padding:1px 2px;border-radius:2px}
.editable:hover{border-bottom-color:var(--accent);background:rgba(0,212,255,.05)}
.inline-input{background:var(--bg-3);border:1px solid var(--accent);border-radius:4px;padding:3px 6px;color:var(--text);font-size:.82rem;font-family:inherit;width:100%;min-width:80px}
.inline-input:focus{outline:none}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none}
.drawer-overlay.open{display:block}
.drawer{position:fixed;right:0;top:0;bottom:0;width:480px;max-width:100vw;background:var(--bg-2);border-left:1px solid var(--border);z-index:101;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease}
.drawer.open{transform:translateX(0)}
.drawer-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.drawer-title{font-size:1rem;font-weight:700;color:var(--accent);flex:1}
.drawer-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.3rem;padding:4px}
.drawer-body{flex:1;overflow-y:auto;padding:20px}
.field-group{margin-bottom:16px}
.field-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.field-input{width:100%;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:.85rem;font-family:inherit}
.field-input:focus{outline:none;border-color:var(--accent)}
textarea.field-input{resize:vertical;min-height:70px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.drawer-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px}
.platform-block{background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;position:relative}
.platform-block .pb-title{font-size:.78rem;font-weight:700;color:var(--accent);margin-bottom:8px}
.platform-block .pb-remove{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem}
.platform-block .pb-remove:hover{color:var(--bad)}
.pb-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pb-full{grid-column:1/-1}
.add-plat-btn{width:100%;background:none;border:1px dashed var(--border);border-radius:8px;padding:8px;color:var(--muted);cursor:pointer;font-size:.8rem;transition:all .15s}
.add-plat-btn:hover{border-color:var(--accent);color:var(--accent)}
.genre-checks{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.genre-check{display:none}
.genre-check+label{font-size:.72rem;padding:3px 8px;border-radius:10px;border:1px solid var(--border);cursor:pointer;background:var(--bg-3);color:var(--muted);transition:all .15s}
.genre-check:checked+label{background:rgba(0,212,255,.15);border-color:var(--accent);color:var(--accent)}

/* COPY TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--good);color:#0a0e1a;padding:8px 18px;border-radius:8px;font-size:.85rem;font-weight:700;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}

/* LOADING */
.loading{text-align:center;padding:60px;color:var(--muted)}

/* ROM STATUS */
.rom-row{display:flex;flex-direction:column;gap:2px}
.rom-btns{display:flex;gap:2px}
.rom-btn{border:none;border-radius:4px;padding:3px 5px;font-size:.58rem;cursor:pointer;font-weight:700;transition:all .2s;opacity:.28;line-height:1}
.rom-btn:hover{opacity:.65}
.rom-btn.active{opacity:1;box-shadow:0 0 0 1px rgba(255,255,255,.25)}
.rom-btn.installed{background:var(--good);color:#fff}
.rom-btn.sd_card{background:#f97316;color:#fff}
.rom-btn.found{background:#eab308;color:#000}
.rom-btn.missing{background:var(--bad);color:#fff}
</style>
</head>
<body>

<div class="topbar">
  <h1>🗄️ DATABASE</h1>
  <span id="db-stats" style="font-size:.78rem;color:var(--muted)"></span>
  <div class="topbar-links">
    <a href="index.html">🏠 Hub</a>
    <a href="Retroid_Library_Dashboard.html">📚 Kütüphane</a>
    <a href="admin.html">➕ Ekle</a>
    <a href="Retroid_Cover_Test.html">🖼️ Cover Test</a>
  </div>
</div>

<div class="toolbar">
  <input class="search-box" id="search" placeholder="🔍 Oyun, seri, geliştirici..." oninput="applyFilters()">
  <select class="filter" id="f-status" onchange="applyFilters()">
    <option value="">Tüm Durumlar</option>
    <option value="backlog">Backlog</option>
    <option value="playing">Oynuyor</option>
    <option value="completed">Bitti</option>
    <option value="dropped">Bıktım</option>
    <option value="wishlist">İstek</option>
  </select>
  <select class="filter" id="f-system" onchange="applyFilters()">
    <option value="">Tüm Sistemler</option>
  </select>
  <select class="filter" id="f-genre" onchange="applyFilters()">
    <option value="">Tüm Türler</option>
  </select>
  <select class="filter" id="f-coop" onchange="applyFilters()">
    <option value="">Co-op Filtre</option>
    <option value="yes">Co-op var</option>
    <option value="no">Tek oyuncu</option>
  </select>
  <span class="count-badge" id="count-badge">— oyun</span>
  <button class="btn btn-ghost copy-all-btn" onclick="copyAllTitles()">📋 Tüm İsimleri Kopyala</button>
  <button class="btn btn-accent" onclick="openDrawer(null)">➕ Yeni Oyun</button>
</div>

<div class="table-wrap">
  <table id="main-table">
    <thead>
      <tr>
        <th></th>
        <th onclick="sortBy('title')" id="th-title">Oyun</th>
        <th onclick="sortBy('release_year')" id="th-release_year">Yıl</th>
        <th>Sistem</th>
        <th>Tür</th>
        <th onclick="sortBy('rating')" id="th-rating">Puan</th>
        <th onclick="sortBy('play_status')" id="th-play_status">Durum</th>
        <th>Özellik</th>
        <th>ROM URL</th>
        <th>ROM Durumu</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="table-body">
      <tr><td colspan="11" class="loading">⏳ Yükleniyor...</td></tr>
    </tbody>
  </table>
</div>

<!-- DRAWER -->
<div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-title" id="drawer-title">Oyun Düzenle</div>
    <button class="drawer-close" onclick="closeDrawer()">×</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-footer">
    <button class="btn btn-accent" onclick="saveDrawer()" style="flex:1">💾 Kaydet</button>
    <button class="btn btn-ghost" onclick="closeDrawer()">İptal</button>
    <button class="btn btn-danger" id="drawer-delete-btn" onclick="deleteDrawerGame()" style="display:none">🗑️ Sil</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB='https://bniqmxbtvgwkaoswugds.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuaXFteGJ0dmd3a2Fvc3d1Z2RzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTExMTYsImV4cCI6MjA5MzQyNzExNn0.VXjnGv3uV8A2XfAW5jOBAkxyzc9c9q6adrA64JfwrQs';
const H={headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json'}};

let ALL=[], filtered=[], SYSTEMS=[], GENRES=[], SERIES=[], EMULATORS=[];
let sortCol='title', sortAsc=true, drawerGameId=null;

async function sb(ep){ return fetch(`${SB}/rest/v1/${ep}`,{headers:{apikey:KEY,Authorization:`Bearer ${KEY}`}}).then(r=>r.json()); }
async function patch(ep,body){ return fetch(`${SB}/rest/v1/${ep}`,{method:'PATCH',headers:{...H.headers,Prefer:'return=minimal'},body:JSON.stringify(body)}); }
async function post(ep,body){ return fetch(`${SB}/rest/v1/${ep}`,{method:'POST',headers:{...H.headers,Prefer:'return=representation'},body:JSON.stringify(body)}).then(r=>r.json()); }
async function del(ep){ return fetch(`${SB}/rest/v1/${ep}`,{method:'DELETE',headers:H.headers}); }

async function load(){
  [ALL, SYSTEMS, GENRES, SERIES, EMULATORS] = await Promise.all([
    sb('games?select=id,title,release_year,developer,description,is_coop,coop_notes,play_status,rating,is_iconic,game_log,tier,primary_cover_url,series(id,name),game_genres(genres(id,name)),game_platforms(id,cover_url,performance,performance_notes,rom_url,rom_status,region,systems(id,name),emulators(id,name))&order=title'),
    sb('systems?select=id,name&order=name'),
    sb('genres?select=id,name&order=name'),
    sb('series?select=id,name&order=name'),
    sb('emulators?select=id,name&order=name'),
  ]);
  // Sistem filter
  const fSys=document.getElementById('f-system');
  SYSTEMS.forEach(s=>fSys.innerHTML+=`<option value="${s.name}">${s.name}</option>`);
  // Genre filter
  const fGen=document.getElementById('f-genre');
  GENRES.forEach(g=>fGen.innerHTML+=`<option value="${g.name}">${g.name}</option>`);
  // Stats
  document.getElementById('db-stats').textContent=`${ALL.length} oyun · ${SYSTEMS.length} sistem`;
  filtered=[...ALL];
  render();
}

function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase();
  const st=document.getElementById('f-status').value;
  const sys=document.getElementById('f-system').value;
  const gen=document.getElementById('f-genre').value;
  const coop=document.getElementById('f-coop').value;
  filtered=ALL.filter(g=>{
    if(q&&!(g.title+' '+(g.series?.name||'')+' '+(g.developer||'')).toLowerCase().includes(q))return false;
    if(st&&g.play_status!==st)return false;
    if(sys&&!g.game_platforms?.some(p=>p.systems?.name===sys))return false;
    if(gen&&!g.game_genres?.some(gg=>gg.genres?.name===gen))return false;
    if(coop==='yes'&&!g.is_coop)return false;
    if(coop==='no'&&g.is_coop)return false;
    return true;
  });
  render();
}

function sortBy(col){
  if(sortCol===col) sortAsc=!sortAsc;
  else{sortCol=col;sortAsc=true;}
  document.querySelectorAll('thead th').forEach(th=>{th.classList.remove('sorted','asc');});
  const th=document.getElementById('th-'+col);
  if(th){th.classList.add('sorted');if(sortAsc)th.classList.add('asc');}
  render();
}

function render(){
  document.getElementById('count-badge').textContent=`${filtered.length} oyun`;
  const sorted=[...filtered].sort((a,b)=>{
    let av=a[sortCol]??'', bv=b[sortCol]??'';
    if(typeof av==='string') return sortAsc?av.localeCompare(bv):bv.localeCompare(av);
    return sortAsc?av-bv:bv-av;
  });
  const tbody=document.getElementById('table-body');
  if(!sorted.length){tbody.innerHTML='<tr><td colspan="11" class="loading">Sonuç bulunamadı.</td></tr>';return;}
  tbody.innerHTML=sorted.map(g=>{
    const cover=g.primary_cover_url||'';
    const systems=[...new Set((g.game_platforms||[]).map(p=>p.systems?.name).filter(Boolean))];
    const genres=(g.game_genres||[]).map(gg=>gg.genres?.name).filter(Boolean);
    const perf=g.game_platforms?.[0]?.performance||'good';
    const romUrl=g.game_platforms?.[0]?.rom_url||'';
    const statusClass={backlog:'status-backlog',playing:'status-playing',completed:'status-completed',dropped:'status-dropped',wishlist:'status-wishlist'}[g.play_status]||'status-backlog';
    const statusLabel={backlog:'Backlog',playing:'Oynuyor',completed:'Bitti',dropped:'Bıktım',wishlist:'İstek'}[g.play_status]||g.play_status;
    return`<tr>
      <td class="cover-cell">${cover?`<img src="${cover}" onerror="this.parentNode.innerHTML='<div class=no-cover>?</div>'">`:'<div class="no-cover">?</div>'}</td>
      <td class="title-cell">
        <div>${g.title}${g.is_iconic?' <span class="badge badge-iconic">★</span>':''}</div>
        ${g.series?.name?`<div class="series-sub">${g.series.name}</div>`:''}
      </td>
      <td style="color:var(--muted)">${g.release_year||'—'}</td>
      <td>${systems.map(s=>`<span class="badge badge-sys">${s}</span>`).join('')||'—'}</td>
      <td>${genres.slice(0,2).map(g=>`<span class="badge badge-genre">${g}</span>`).join('')||'—'}</td>
      <td style="font-weight:700;color:${g.rating>=8?'var(--good)':g.rating>=6?'var(--warn)':'var(--bad)'}">${g.rating||'—'}</td>
      <td><span class="status-pill ${statusClass}">${statusLabel}</span></td>
      <td>${g.is_coop?'<span class="badge badge-coop">2P</span>':''}</td>
      <td style="max-width:160px">
        ${romUrl
          ?`<span class="editable" title="${romUrl}" onclick="editRomUrl('${g.id}',this,'${(g.game_platforms?.[0]?.id||'')}')">🔗 ${romUrl.split('/').pop().substring(0,20)}...</span>`
          :`<span class="editable" style="color:var(--muted);font-size:.75rem" onclick="editRomUrl('${g.id}',this,'${(g.game_platforms?.[0]?.id||'')}')">+ ROM ekle</span>`
        }
      </td>
      <td onclick="event.stopPropagation()">
        <div class="rom-row">${(g.game_platforms||[]).map(p=>{
          const rs=p.rom_status||'missing';
          const pid=p.id;
          return '<div class="rom-btns">'+
            '<button class="rom-btn installed'+(rs==='installed'?' active':'')+'" onclick="setRomStatus(\''+pid+'\',\'installed\')" title="📲 Cihaza yüklendi">📲</button>'+
            '<button class="rom-btn sd_card'+(rs==='sd_card'?' active':'')+'" onclick="setRomStatus(\''+pid+'\',\'sd_card\')" title="💾 SD kartta">💾</button>'+
            '<button class="rom-btn found'+(rs==='found'?' active':'')+'" onclick="setRomStatus(\''+pid+'\',\'found\')" title="📁 Bulundu">📁</button>'+
            '<button class="rom-btn missing'+(rs==='missing'?' active':'')+'" onclick="setRomStatus(\''+pid+'\',\'missing\')" title="❌ ROM yok">❌</button>'+
          '</div>';
        }).join('')}</div>
      </td>
      <td class="action-cell">
        <button class="icon-btn" onclick="copyTitle('${g.title.replace(/'/g,"\\'")}')">📋</button>
        <button class="icon-btn" onclick="openDrawer('${g.id}')">✏️</button>
        <button class="icon-btn del" onclick="confirmDelete('${g.id}','${g.title.replace(/'/g,"\\'")}')">🗑️</button>
      </td>
    </tr>`;
  }).join('');
}

// ── ROM STATUS ──
async function setRomStatus(platformId, romStatus){
  ALL.forEach(g=>g.game_platforms?.forEach(p=>{if(p.id===platformId)p.rom_status=romStatus;}));
  render();
  await patch(`game_platforms?id=eq.${platformId}`,{rom_status:romStatus});
  toast('ROM durumu güncellendi');
}

// ── INLINE ROM URL EDİT ──
function editRomUrl(gameId, el, platformId){
  const cur=el.title||'';
  const input=document.createElement('input');
  input.className='inline-input';
  input.value=cur;
  input.placeholder='https://... veya yerel yol';
  el.replaceWith(input);
  input.focus();
  async function save(){
    const val=input.value.trim();
    if(platformId){
      await patch(`game_platforms?id=eq.${platformId}`,{rom_url:val||null});
    }
    const g=ALL.find(x=>x.id===gameId);
    if(g&&g.game_platforms?.[0]) g.game_platforms[0].rom_url=val;
    filtered=[...ALL]; applyFilters();
    toast('ROM URL kaydedildi');
  }
  input.addEventListener('blur',save);
  input.addEventListener('keydown',e=>{if(e.key==='Enter')input.blur();if(e.key==='Escape'){input.blur();}});
}

// ── COPY ──
function copyTitle(title){
  navigator.clipboard.writeText(title);
  toast(`"${title}" kopyalandı`);
}
function copyAllTitles(){
  const titles=filtered.map(g=>g.title).join('\n');
  navigator.clipboard.writeText(titles);
  toast(`${filtered.length} oyun ismi kopyalandı`);
}

// ── TOAST ──
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

// ── DELETE ──
async function confirmDelete(id,title){
  if(!confirm(`"${title}" silinecek. Emin misin?`))return;
  await del(`game_genres?game_id=eq.${id}`);
  await del(`game_platforms?game_id=eq.${id}`);
  await del(`games?id=eq.${id}`);
  ALL=ALL.filter(g=>g.id!==id);
  applyFilters();
  toast(`"${title}" silindi`);
}

// ── DRAWER ──
function openDrawer(gameId){
  drawerGameId=gameId;
  const g=gameId?ALL.find(x=>x.id===gameId):null;
  document.getElementById('drawer-title').textContent=g?`✏️ ${g.title}`:'➕ Yeni Oyun';
  document.getElementById('drawer-delete-btn').style.display=g?'':'none';
  document.getElementById('drawer-body').innerHTML=buildDrawerForm(g);
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function buildDrawerForm(g){
  const seriesOpts=SERIES.map(s=>`<option value="${s.id}"${g?.series?.id==s.id?' selected':''}>${s.name}</option>`).join('');
  const sysOpts=SYSTEMS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  const emuOpts=EMULATORS.map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
  const selectedGenres=new Set((g?.game_genres||[]).map(gg=>gg.genres?.id));
  const genreChecks=GENRES.map(gen=>`
    <input type="checkbox" class="genre-check" id="gc-${gen.id}" value="${gen.id}" ${selectedGenres.has(gen.id)?'checked':''}>
    <label for="gc-${gen.id}">${gen.name}</label>`).join('');

  const platforms=(g?.game_platforms||[{}]).map((p,i)=>`
    <div class="platform-block" id="pb-${i}">
      <div class="pb-title">Platform ${i+1}</div>
      <button type="button" class="pb-remove" onclick="document.getElementById('pb-${i}').remove()">✕</button>
      <input type="hidden" class="pb-id" value="${p.id||''}">
      <div class="pb-grid">
        <div><div class="field-label">Sistem</div>
          <select class="field-input pb-sys">
            <option value="">Seç...</option>${sysOpts.replace(`value="${p.systems?.id||''}"`,`value="${p.systems?.id||''}" selected`)}
          </select></div>
        <div><div class="field-label">Emülatör</div>
          <select class="field-input pb-emu">
            <option value="">—</option>${emuOpts.replace(`value="${p.emulators?.id||''}"`,`value="${p.emulators?.id||''}" selected`)}
          </select></div>
        <div><div class="field-label">Performans</div>
          <select class="field-input pb-perf">
            <option value="good"${p.performance==='good'?' selected':''}>✓ Smooth</option>
            <option value="warn"${p.performance==='warn'?' selected':''}>⚠ Tweak Gerekli</option>
            <option value="bad"${p.performance==='bad'?' selected':''}>✗ Sorunlu</option>
          </select></div>
        <div><div class="field-label">Bölge</div>
          <select class="field-input pb-region">
            <option value="USA"${(p.region||'USA')==='USA'?' selected':''}>USA</option>
            <option value="EUR"${p.region==='EUR'?' selected':''}>EUR</option>
            <option value="JAP"${p.region==='JAP'?' selected':''}>JAP</option>
          </select></div>
        <div class="pb-full"><div class="field-label">Cover URL</div>
          <input class="field-input pb-cover" type="url" value="${p.cover_url||''}" placeholder="https://thumbnails.libretro.com/..."></div>
        <div class="pb-full"><div class="field-label">ROM URL / Yol</div>
          <input class="field-input pb-rom" type="text" value="${p.rom_url||''}" placeholder="/storage/ROMs/PS2/game.iso veya https://..."></div>
        <div class="pb-full"><div class="field-label">Perf Notu</div>
          <input class="field-input pb-perfnote" type="text" value="${p.performance_notes||''}" placeholder="60fps sabit, tweak detayı..."></div>
      </div>
    </div>`).join('');

  return`
    <div class="field-row">
      <div class="field-group">
        <div class="field-label">Oyun Adı *</div>
        <input class="field-input" id="d-title" value="${g?.title||''}" placeholder="Oyun adı">
      </div>
      <div class="field-group">
        <div class="field-label">Çıkış Yılı</div>
        <input class="field-input" id="d-year" type="number" value="${g?.release_year||''}" placeholder="2001">
      </div>
    </div>
    <div class="field-row">
      <div class="field-group">
        <div class="field-label">Geliştirici</div>
        <input class="field-input" id="d-dev" value="${g?.developer||''}" placeholder="Nintendo">
      </div>
      <div class="field-group">
        <div class="field-label">Seri</div>
        <select class="field-input" id="d-series">
          <option value="">— Seri Yok —</option>${seriesOpts}
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field-group">
        <div class="field-label">Rating (1-10)</div>
        <input class="field-input" id="d-rating" type="number" min="1" max="10" value="${g?.rating||''}">
      </div>
      <div class="field-group">
        <div class="field-label">Durum</div>
        <select class="field-input" id="d-status">
          <option value="backlog"${g?.play_status==='backlog'?' selected':''}>Backlog</option>
          <option value="playing"${g?.play_status==='playing'?' selected':''}>Oynuyor</option>
          <option value="completed"${g?.play_status==='completed'?' selected':''}>Bitti</option>
          <option value="dropped"${g?.play_status==='dropped'?' selected':''}>Bıktım</option>
          <option value="wishlist"${g?.play_status==='wishlist'?' selected':''}>İstek</option>
        </select>
      </div>
    </div>
    <div class="field-row" style="margin-bottom:14px">
      <label style="display:flex;align-items:center;gap:6px;font-size:.82rem;cursor:pointer">
        <input type="checkbox" id="d-coop" ${g?.is_coop?'checked':''}> Co-op
      </label>
      <label style="display:flex;align-items:center;gap:6px;font-size:.82rem;cursor:pointer">
        <input type="checkbox" id="d-iconic" ${g?.is_iconic?'checked':''}> Kült Klasik ★
      </label>
    </div>
    <div class="field-group">
      <div class="field-label">Co-op Notu</div>
      <input class="field-input" id="d-coop-notes" value="${g?.coop_notes||''}" placeholder="2P split-screen...">
    </div>
    <div class="field-group">
      <div class="field-label">Açıklama</div>
      <textarea class="field-input" id="d-desc">${g?.description||''}</textarea>
    </div>
    <div class="field-group">
      <div class="field-label">Primary Cover URL</div>
      <input class="field-input" id="d-cover" value="${g?.primary_cover_url||''}" placeholder="https://...">
    </div>
    <div class="field-group">
      <div class="field-label">Türler</div>
      <div class="genre-checks">${genreChecks}</div>
    </div>
    <div class="field-label" style="margin:14px 0 8px">Platformlar</div>
    <div id="platforms-list">${platforms}</div>
    <button type="button" class="add-plat-btn" onclick="addPlatformBlock()">+ Platform Ekle</button>
  `;
}

function addPlatformBlock(){
  const list=document.getElementById('platforms-list');
  const i=list.children.length;
  const sysOpts=SYSTEMS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  const emuOpts=EMULATORS.map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
  const div=document.createElement('div');
  div.className='platform-block'; div.id=`pb-${i}`;
  div.innerHTML=`
    <div class="pb-title">Platform ${i+1}</div>
    <button type="button" class="pb-remove" onclick="this.closest('.platform-block').remove()">✕</button>
    <input type="hidden" class="pb-id" value="">
    <div class="pb-grid">
      <div><div class="field-label">Sistem</div><select class="field-input pb-sys"><option value="">Seç...</option>${sysOpts}</select></div>
      <div><div class="field-label">Emülatör</div><select class="field-input pb-emu"><option value="">—</option>${emuOpts}</select></div>
      <div><div class="field-label">Performans</div><select class="field-input pb-perf"><option value="good">✓ Smooth</option><option value="warn">⚠ Tweak</option><option value="bad">✗ Sorunlu</option></select></div>
      <div><div class="field-label">Bölge</div><select class="field-input pb-region"><option value="USA">USA</option><option value="EUR">EUR</option><option value="JAP">JAP</option></select></div>
      <div class="pb-full"><div class="field-label">Cover URL</div><input class="field-input pb-cover" type="url" placeholder="https://..."></div>
      <div class="pb-full"><div class="field-label">ROM URL / Yol</div><input class="field-input pb-rom" type="text" placeholder="/storage/ROMs/..."></div>
      <div class="pb-full"><div class="field-label">Perf Notu</div><input class="field-input pb-perfnote" type="text" placeholder="60fps sabit..."></div>
    </div>`;
  list.appendChild(div);
}

async function saveDrawer(){
  const title=document.getElementById('d-title').value.trim();
  if(!title){alert('Oyun adı gerekli');return;}
  const gameData={
    title,
    release_year:document.getElementById('d-year').value||null,
    developer:document.getElementById('d-dev').value.trim()||null,
    series_id:document.getElementById('d-series').value||null,
    rating:document.getElementById('d-rating').value||null,
    play_status:document.getElementById('d-status').value,
    is_coop:document.getElementById('d-coop').checked,
    is_iconic:document.getElementById('d-iconic').checked,
    coop_notes:document.getElementById('d-coop-notes').value.trim()||null,
    description:document.getElementById('d-desc').value.trim()||null,
    primary_cover_url:document.getElementById('d-cover').value.trim()||null,
  };
  const selectedGenres=[...document.querySelectorAll('.genre-check:checked')].map(x=>x.value);
  const platforms=[...document.querySelectorAll('#platforms-list .platform-block')].map(pb=>({
    id:pb.querySelector('.pb-id').value||null,
    system_id:pb.querySelector('.pb-sys').value||null,
    emulator_id:pb.querySelector('.pb-emu').value||null,
    performance:pb.querySelector('.pb-perf').value,
    region:pb.querySelector('.pb-region').value,
    cover_url:pb.querySelector('.pb-cover').value.trim()||null,
    rom_url:pb.querySelector('.pb-rom').value.trim()||null,
    performance_notes:pb.querySelector('.pb-perfnote').value.trim()||null,
  })).filter(p=>p.system_id);

  if(drawerGameId){
    // UPDATE
    await patch(`games?id=eq.${drawerGameId}`, gameData);
    await del(`game_genres?game_id=eq.${drawerGameId}`);
    if(selectedGenres.length) await post('game_genres', selectedGenres.map(gid=>({game_id:drawerGameId,genre_id:gid})));
    for(const p of platforms){
      if(p.id){ await patch(`game_platforms?id=eq.${p.id}`,{system_id:p.system_id,emulator_id:p.emulator_id||null,performance:p.performance,region:p.region,cover_url:p.cover_url,rom_url:p.rom_url,performance_notes:p.performance_notes}); }
      else { await post('game_platforms',[{game_id:drawerGameId,...p,id:undefined}]); }
    }
    toast(`"${title}" güncellendi`);
  } else {
    // INSERT
    const [newGame]=await post('games',[gameData]);
    if(selectedGenres.length) await post('game_genres', selectedGenres.map(gid=>({game_id:newGame.id,genre_id:gid})));
    for(const p of platforms) await post('game_platforms',[{game_id:newGame.id,...p,id:undefined}]);
    toast(`"${title}" eklendi`);
  }
  closeDrawer();
  await load();
}

async function deleteDrawerGame(){
  const g=ALL.find(x=>x.id===drawerGameId);
  if(!g||!confirm(`"${g.title}" silinecek. Emin misin?`))return;
  await del(`game_genres?game_id=eq.${drawerGameId}`);
  await del(`game_platforms?game_id=eq.${drawerGameId}`);
  await del(`games?id=eq.${drawerGameId}`);
  closeDrawer();
  ALL=ALL.filter(x=>x.id!==drawerGameId);
  applyFilters();
  toast(`"${g.title}" silindi`);
}

  const r=await fetch(`${SB}/rest/v1/game_platforms?select=rom_url&limit=1`,{headers:{apikey:KEY,Authorization:`Bearer ${KEY}`}});
  if(!r.ok) console.warn('rom_url kolonu henüz yok — migration_v5.sql çalıştır');
}

checkRomUrlColumn();
load();
