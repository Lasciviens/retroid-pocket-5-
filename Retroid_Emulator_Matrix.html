<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Retroid Emulator Matrix</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--bg-1:#0a0e1a;--bg-2:#131829;--bg-3:#1c2238;--accent:#00d4ff;--accent-2:#ff4655;--gold:#ffb347;--good:#2ecc71;--warn:#f39c12;--text:#e8eaf0;--muted:#8c93a8;--border:#2a3149}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,var(--bg-1),var(--bg-2));color:var(--text);min-height:100vh;padding:20px}
header{text-align:center;margin-bottom:28px;padding:24px 20px;background:linear-gradient(135deg,rgba(0,212,255,.1),rgba(255,70,85,.1));border:1px solid var(--border);border-radius:16px}
h1{font-size:2rem;background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;letter-spacing:-1px}
.subtitle{color:var(--muted);font-size:.9rem}
.quick-links{display:flex;justify-content:center;gap:8px;margin-top:14px;flex-wrap:wrap}
.quick-links a{background:var(--bg-3);border:1px solid var(--border);color:var(--accent);padding:6px 12px;border-radius:8px;text-decoration:none;font-size:.8rem;font-weight:600;transition:all .2s}
.quick-links a:hover{border-color:var(--accent)}
.section-title{font-size:1.2rem;font-weight:800;color:var(--accent);margin:28px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:20px}
.card{background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:18px;transition:border-color .2s}
.card:hover{border-color:var(--accent)}
.card-title{font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:4px}
.card-sub{font-size:.75rem;color:var(--muted);margin-bottom:8px}
.card-note{font-size:.85rem;color:var(--text);line-height:1.5}
.badge{display:inline-block;font-size:.65rem;padding:2px 8px;border-radius:4px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-right:4px;margin-bottom:4px}
.badge-standalone{background:rgba(46,204,113,.2);color:var(--good);border:1px solid rgba(46,204,113,.3)}
.badge-core{background:rgba(0,212,255,.15);color:var(--accent);border:1px solid rgba(0,212,255,.3)}
.badge-sys{background:var(--bg-3);color:var(--muted);border:1px solid var(--border)}
.gen-tag{display:inline-block;background:rgba(255,179,71,.15);color:var(--gold);border:1px solid rgba(255,179,71,.3);font-size:.65rem;padding:2px 8px;border-radius:4px;font-weight:700;margin-left:6px}
.loading{text-align:center;padding:60px;color:var(--muted)}
.table-wrap{overflow-x:auto;margin-bottom:30px}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{background:var(--bg-3);color:var(--accent);padding:10px 14px;text-align:left;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:top}
tr:hover td{background:var(--bg-3)}
footer{text-align:center;margin-top:36px;padding:16px;color:var(--muted);font-size:.8rem}
footer a{color:var(--accent);text-decoration:none}
.sbtn{background:var(--bg-3);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--muted);font-size:.75rem;cursor:pointer;transition:all .2s;font-weight:600}
.sbtn:hover{border-color:var(--accent);color:var(--accent)}
.sbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
</style>
</head>
<body>
<header>
  <h1>EMÜLATÖR MATRİSİ</h1>
  <p class="subtitle">Hangi sistem için hangi emülatör? RP5 için optimize seçimler.</p>
  <div class="quick-links">
    <a href="index.html">🏠 Hub</a>
    <a href="Retroid_Library_Dashboard.html">📚 Kütüphane</a>
    <a href="Retroid_Glossary.html">📖 Glossary</a>
    <a href="Retroid_Series_Roadmap.html">🗺️ Seriler</a>
  </div>
</header>

<div id="content"><div class="loading">⏳ Yükleniyor...</div></div>

<footer>
  Retroid Pocket 5 · <a href="https://lasciviens.netlify.app">lasciviens.netlify.app</a>
</footer>

<script>
const SB='https://bniqmxbtvgwkaoswugds.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuaXFteGJ0dmd3a2Fvc3d1Z2RzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTExMTYsImV4cCI6MjA5MzQyNzExNn0.VXjnGv3uV8A2XfAW5jOBAkxyzc9c9q6adrA64JfwrQs';
const H={headers:{apikey:KEY,Authorization:`Bearer ${KEY}`}};

let allSystems=[], allEmulators=[], sortSys='generation', sortEmu='name';

async function load(){
  const [systems,emulators,junctions]=await Promise.all([
    fetch(`${SB}/rest/v1/systems?select=*`,H).then(r=>r.json()),
    fetch(`${SB}/rest/v1/emulators?select=*`,H).then(r=>r.json()),
    fetch(`${SB}/rest/v1/emulator_systems?select=emulator_id,system_id`,H).then(r=>r.json()).catch(()=>[]),
  ]);
  allSystems=systems||[];
  // junction tablosundan sistem isimlerini emülatöre ekle (fallback: supported_systems text[])
  const emuMap=Object.fromEntries((emulators||[]).map(e=>[e.id,e]));
  const sysMap=Object.fromEntries((systems||[]).map(s=>[s.id,s]));
  if(Array.isArray(junctions)&&junctions.length>0){
    // junction tablosu dolu — bunu kullan
    const builtSystems={};
    junctions.forEach(j=>{
      if(!builtSystems[j.emulator_id])builtSystems[j.emulator_id]=[];
      if(sysMap[j.system_id])builtSystems[j.emulator_id].push(sysMap[j.system_id].name);
    });
    allEmulators=(emulators||[]).map(e=>({...e,_systems:builtSystems[e.id]||e.supported_systems||[]}));
  } else {
    // fallback: eski text[] kolonunu kullan
    allEmulators=(emulators||[]).map(e=>({...e,_systems:e.supported_systems||[]}));
  }
  render();
}

function sortedSystems(){
  return [...allSystems].sort((a,b)=>{
    if(sortSys==='generation')return(a.generation||99)-(b.generation||99)||a.name.localeCompare(b.name);
    if(sortSys==='year')return(a.release_year||9999)-(b.release_year||9999);
    if(sortSys==='manufacturer')return(a.manufacturer||'').localeCompare(b.manufacturer||'');
    return a.name.localeCompare(b.name);
  });
}
function sortedEmulators(){
  return [...allEmulators].sort((a,b)=>{
    if(sortEmu==='type')return(a.type||'').localeCompare(b.type||'')||a.name.localeCompare(b.name);
    return a.name.localeCompare(b.name);
  });
}

function render(){
  const systems=sortedSystems();
  const emulators=sortedEmulators();
  const cont=document.getElementById('content');

  // Sort controls
  let html=`<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
    <span style="font-size:.8rem;color:var(--muted)">Sistem sırala:</span>
    <button onclick="sortSys='generation';render()" class="sbtn${sortSys==='generation'?' active':''}">Nesil</button>
    <button onclick="sortSys='name';render()" class="sbtn${sortSys==='name'?' active':''}">A-Z</button>
    <button onclick="sortSys='year';render()" class="sbtn${sortSys==='year'?' active':''}">Yıl</button>
    <button onclick="sortSys='manufacturer';render()" class="sbtn${sortSys==='manufacturer'?' active':''}">Üretici</button>
    <span style="font-size:.8rem;color:var(--muted);margin-left:12px">Emülatör sırala:</span>
    <button onclick="sortEmu='name';render()" class="sbtn${sortEmu==='name'?' active':''}">A-Z</button>
    <button onclick="sortEmu='type';render()" class="sbtn${sortEmu==='type'?' active':''}">Tip</button>
  </div>`;

  html+=`<div class="section-title">📋 Sistem → Önerilen Emülatör</div>
  <div class="table-wrap"><table>
  <thead><tr><th>Sistem</th><th>Üretici</th><th>Nesil</th><th>Yıl</th><th>Önerilen Emülatör</th><th>Tip</th><th>Not</th></tr></thead>
  <tbody>`;

  systems.forEach(sys=>{
    // Bu sistemi destekleyen emülatörleri bul
    const matching=emulators.filter(e=>e._systems&&e._systems.includes(sys.name));
    const best=matching[0];
    html+=`<tr>
      <td><strong>${sys.name}</strong></td>
      <td style="color:var(--muted)">${sys.manufacturer||'—'}</td>
      <td>${sys.generation?`<span class="gen-tag">${sys.generation}. Nesil</span>`:'—'}</td>
      <td style="color:var(--muted)">${sys.release_year||'—'}</td>
      <td style="color:var(--accent)">${best?best.name:'—'}</td>
      <td>${best?`<span class="badge ${best.type==='standalone'?'badge-standalone':'badge-core'}">${best.type==='standa
