<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Retroid Glossary — Teknik Terimler</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--bg-1:#0a0e1a;--bg-2:#131829;--bg-3:#1c2238;--accent:#00d4ff;--accent-2:#ff4655;--gold:#ffb347;--text:#e8eaf0;--muted:#8c93a8;--border:#2a3149;--code-bg:#0d1117}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,var(--bg-1),var(--bg-2));color:var(--text);min-height:100vh;padding:20px;line-height:1.6}
header{text-align:center;margin-bottom:28px;padding:24px 20px;background:linear-gradient(135deg,rgba(0,212,255,.1),rgba(255,179,71,.1));border:1px solid var(--border);border-radius:16px}
h1{font-size:2.2rem;background:linear-gradient(90deg,var(--accent),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;letter-spacing:-1px}
.subtitle{color:var(--muted)}
.quick-links{display:flex;justify-content:center;gap:8px;margin-top:14px;flex-wrap:wrap}
.quick-links a{background:var(--bg-3);border:1px solid var(--border);color:var(--accent);padding:6px 12px;border-radius:8px;text-decoration:none;font-size:.8rem;font-weight:600;transition:all .2s}
.quick-links a:hover{border-color:var(--accent)}
.layout{display:grid;grid-template-columns:220px 1fr;gap:20px;max-width:1300px;margin:0 auto}
.sidebar{position:sticky;top:20px;height:fit-content;background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:16px}
.sidebar h3{color:var(--accent);font-size:.8rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.sidebar ul{list-style:none}
.sidebar li{margin-bottom:3px}
.sidebar a{color:var(--text);text-decoration:none;padding:5px 8px;display:block;border-radius:6px;font-size:.85rem;transition:all .2s}
.sidebar a:hover,.sidebar a.active{background:var(--bg-3);color:var(--accent)}
.search-box{width:100%;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:.9rem;margin-bottom:18px}
.search-box:focus{outline:none;border-color:var(--accent)}
.term-card{background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:14px;transition:border-color .2s;scroll-margin-top:20px}
.term-card:hover{border-color:var(--accent)}
.term-card.hidden{display:none}
.term-header{display:flex;align-items:baseline;gap:10px;margin-bottom:12px}
.term-name{font-size:1.6rem;color:var(--accent);font-weight:700}
.term-cat{font-size:.65rem;background:var(--bg-3);color:var(--muted);padding:3px 10px;border-radius:4px;text-transform:uppercase;letter-spacing:1px}
.term-summary{font-size:1rem;font-weight:600;margin-bottom:12px;color:var(--text)}
.term-detail{color:var(--text);line-height:1.8;font-size:.92rem}
.term-detail code{background:var(--code-bg);color:var(--accent-2);padding:2px 6px;border-radius:4px;font-family:'Consolas',monospace;font-size:.88em}
.loading{text-align:center;padding:60px;color:var(--muted)}
.empty-msg{text-align:center;padding:40px;color:var(--muted)}
footer{text-align:center;margin-top:36px;padding:16px;color:var(--muted);font-size:.8rem}
footer a{color:var(--accent);text-decoration:none}
@media(max-width:768px){.layout{grid-template-columns:1fr}.sidebar{position:static}}
</style>
</head>
<body>
<header>
  <h1>RETROID GLOSSARY</h1>
  <p class="subtitle">Teknik Terimler — Yazılımcı Mantığıyla Açıklamalı</p>
  <div class="quick-links">
    <a href="index.html">🏠 Hub</a>
    <a href="Retroid_Library_Dashboard.html">📚 Kütüphane</a>
    <a href="Retroid_Series_Roadmap.html">🗺️ Seriler</a>
    <a href="Retroid_Emulator_Matrix.html">⚙️ Emülatörler</a>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <h3>Terimler</h3>
    <ul id="toc"><li style="color:var(--muted);font-size:.8rem">Yükleniyor...</li></ul>
  </aside>
  <main>
    <input type="text" class="search-box" id="search" placeholder="Terim, kategori veya açıklama ara...">
    <div id="terms"><div class="loading">⏳ Yükleniyor...</div></div>
  </main>
</div>

<footer>
  Retroid Pocket 5 · <a href="https://lasciviens.netlify.app">lasciviens.netlify.app</a>
</footer>

<script>
const SB='https://bniqmxbtvgwkaoswugds.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuaXFteGJ0dmd3a2Fvc3d1Z2RzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTExMTYsImV4cCI6MjA5MzQyNzExNn0.VXjnGv3uV8A2XfAW5jOBAkxyzc9c9q6adrA64JfwrQs';

async function load(){
  const r=await fetch(`${SB}/rest/v1/glossary?select=*&order=term`,{headers:{apikey:KEY,Authorization:`Bearer ${KEY}`}});
  const terms=await r.json();
  if(!terms.length){document.getElementById('terms').innerHTML='<div class="empty-msg">Glossary boş. Önce migrate_glossary.html\'i çalıştır.</div>';return;}

  const toc=document.getElementById('toc');
  const cont=document.getElementById('terms');
  toc.innerHTML='';
  cont.innerHTML='';

  terms.forEach(t=>{
    const id='term-'+t.id;
    toc.innerHTML+=`<li><a href="#${id}" onclick="highlight('${id}')">${t.term}</a></li>`;
    const card=document.createElement('div');
    card.className='term-card';
    card.id=id;
    card.dataset.search=(t.term+' '+t.category+' '+t.summary+' '+t.full_explanation).toLowerCase();
    card.innerHTML=`
      <div class="term-header">
        <div class="term-name">${t.term}</div>
        <span class="term-cat">${t.category||''}</span>
      </div>
      <div class="term-summary">${t.summary||''}</div>
      <div class="term-detail">${(t.full_explanation||'').replace(/`([^`]+)`/g,'<code>$1</code>')}</div>`;
    cont.appendChild(card);
  });
}

function highlight(id){
  document.querySelectorAll('.sidebar a').forEach(a=>a.classList.remove('active'));
  const link=document.querySelector(`.sidebar a[href="#${id}"]`);
  if(link)link.classList.add('active');
}

document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  document.querySelectorAll('.term-card').forEach(c=>{
    c.classList.toggle('hidden',!!q&&!c.dataset.search.includes(q));
  });
});

load();
</script>
</body>
</html>
