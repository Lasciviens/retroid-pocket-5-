<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Oynama Sırası — Retroid RP5</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--bg-1:#0a0e1a;--bg-2:#131829;--bg-3:#1c2238;--accent:#ffb347;--accent-2:#00d4ff;--good:#2ecc71;--warn:#f39c12;--bad:#e74c3c;--text:#e8eaf0;--muted:#8c93a8;--border:#2a3149}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,var(--bg-1),var(--bg-2));color:var(--text);min-height:100vh;padding:20px}
header{text-align:center;margin-bottom:24px;padding:22px 20px;background:linear-gradient(135deg,rgba(255,179,71,.1),rgba(0,212,255,.1));border:1px solid var(--border);border-radius:16px}
h1{font-size:1.9rem;background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;letter-spacing:-1px}
.subtitle{color:var(--muted);font-size:.9rem}
.quick-links{display:flex;justify-content:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.quick-links a{background:var(--bg-3);border:1px solid var(--border);color:var(--accent-2);padding:6px 12px;border-radius:8px;text-decoration:none;font-size:.8rem;font-weight:600;transition:all .2s}
.quick-links a:hover{border-color:var(--accent-2)}

/* Search & add from library */
.add-section{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px}
.add-section h3{font-size:.9rem;font-weight:700;color:var(--accent);margin-bottom:12px}
.search-row{display:flex;gap:8px;margin-bottom:10px}
.search-row input{flex:1;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:.88rem}
.search-row input:focus{outline:none;border-color:var(--accent)}
.suggestions{background:var(--bg-3);border:1px solid var(--border);border-radius:8px;max-height:200px;overflow-y:auto;margin-top:4px;display:none}
.suggestion-item{padding:9px 12px;cursor:pointer;font-size:.88rem;display:flex;align-items:center;gap:10px;transition:background .15s}
.suggestion-item:hover{background:var(--bg-2)}
.suggestion-item img{width:32px;height:44px;object-fit:cover;border-radius:4px;background:var(--bg-1)}
.suggestion-info .s-title{font-weight:600;font-size:.85rem}
.suggestion-info .s-meta{font-size:.72rem;color:var(--muted)}

/* Stats */
.stats{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.stat-pill{background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:.78rem;color:var(--muted)}
.stat-pill span{font-weight:700;color:var(--accent)}

/* Queue */
.queue-list{display:flex;flex-direction:column;gap:8px}
.queue-item{background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;transition:all .2s;cursor:grab;user-select:none}
.queue-item:hover{border-color:var(--accent)}
.queue-item.dragging{opacity:.4;border-color:var(--accent);transform:scale(1.01)}
.queue-item.drag-over{border-color:var(--accent-2);background:rgba(0,212,255,.05)}
.queue-num{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--warn));display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;color:var(--bg-1);flex-shrink:0}
.queue-cover{width:40px;height:55px;border-radius:6px;object-fit:cover;background:var(--bg-3);flex-shrink:0}
.queue-cover-fb{width:40px;height:55px;border-radius:6px;background:var(--bg-3);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;color:var(--muted)}
.queue-info{flex:1;min-width:0}
.queue-title{font-size:.92rem;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.queue-meta{font-size:.75rem;color:var(--muted)}
.drag-handle{color:var(--muted);font-size:1.1rem;cursor:grab;padding:4px;flex-shrink:0}
.ibt{background:var(--bg-3);border:1px solid var(--border);border-radius:6px;padding:5px 8px;cursor:pointer;font-size:.8rem;color:var(--text);transition:all .2s;flex-shrink:0}
.ibt:hover{border-color:var(--accent)}
.ibt.del:hover{border-color:var(--bad);color:var(--bad)}
.ibt.done{color:var(--good)}
.ibt.done:hover{border-color:var(--good)}
.empty{text-align:center;padding:50px;color:var(--muted)}
.loading{text-align:center;padding:40px;color:var(--muted)}
footer{text-align:center;margin-top:32px;padding:14px;color:var(--muted);font-size:.8rem}
footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<header>
  <h1>🎮 OYNAMA SIRASI</h1>
  <p class="subtitle">Sıradaki oyunlar. Sürükle-bırak ile sırala.</p>
  <div class="quick-links">
    <a href="index.html">🏠 Hub</a>
    <a href="Retroid_Library_Dashboard.html">📚 Kütüphane</a>
    <a href="Retroid_Request_Tracker.html">♡ İstek Takibi</a>
  </div>
</header>

<div class="add-section">
  <h3>➕ Kütüphaneden Ekle</h3>
  <div class="search-row">
    <input type="text" id="game-search" placeholder="Oyun adı ara..." oninput="searchGames(this.value)" autocomplete="off">
  </div>
  <div class="suggestions" id="suggestions"></div>
</div>

<div class="stats" id="stats"></div>

<div class="queue-list" id="queue"><div class="loading">⏳ Yükleniyor...</div></div>

<footer>Retroid Pocket 5 · <a href="https://lasciviens.netlify.app">lasciviens.netlify.app</a></footer>

<script>
const SB='https://bniqmxbtvgwkaoswugds.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuaXFteGJ0dmd3a2Fvc3d1Z2RzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTExMTYsImV4cCI6MjA5MzQyNzExNn0.VXjnGv3uV8A2XfAW5jOBAkxyzc9c9q6adrA64JfwrQs';
const H={headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json'}};

let QUEUE=[], LIBRARY=[], dragSrcId=null;

async function api(ep,method='GET',body=null){
  const opts={...H,method};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(`${SB}/rest/v1/${ep}`,opts);
  const t=await r.text();
  return t?JSON.parse(t):null;
}

async function load(){
  // Oynama sırası: play_order alanı dolu ve null olmayan oyunlar, sıralı
  // Sıra listesi için play_order > 0 olan oyunları çekiyoruz
  const [lib, queued]=await Promise.all([
    api('games?select=id,title,play_status,play_order,primary_cover_url,game_platforms(systems(name))&order=title'),
    api('games?select=id,title,play_status,play_order,primary_cover_url,game_platforms(systems(name))&play_order=not.is.null&order=play_order'),
  ]);
  LIBRARY=lib||[];
  QUEUE=(queued||[]).sort((a,b)=>(a.play_order||0)-(b.play_order||0));
  renderQueue();
}

function renderQueue(){
  const el=document.getElementById('queue');
  const done=QUEUE.filter(g=>g.play_status==='completed').length;
  const playing=QUEUE.filter(g=>g.play_status==='playing').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat-pill">Sırada: <span>${QUEUE.length}</span></div>
    <div class="stat-pill">Oynuyor: <span>${playing}</span></div>
    <div class="stat-pill">Bitti: <span>${done}</span></div>`;

  if(!QUEUE.length){el.innerHTML='<div class="empty">Sıra boş. Yukarıdan oyun ekle!</div>';return;}

  el.innerHTML=QUEUE.map((g,i)=>{
    const cover=g.primary_cover_url||'';
    const sys=g.game_platforms?.map(p=>p.systems?.name).filter(Boolean).join(', ')||'?';
    const statusColor=g.play_status==='playing'?'var(--warn)':g.play_status==='completed'?'var(--good)':'var(--muted)';
    const statusLabel=g.play_status==='playing'?'Oynuyor':g.play_status==='completed'?'Bitti':g.play_status==='backlog'?'Backlog':g.play_status||'';
    return`<div class="queue-item" draggable="true" data-id="${g.id}"
      ondragstart="dragStart(event,'${g.id}')"
      ondragover="dragOver(event)"
      ondrop="drop(event,'${g.id}')"
      ondragend="dragEnd(event)"
      ontouchstart="touchStart(event,'${g.id}')"
      ontouchmove="touchMove(event)"
      ontouchend="touchEnd(event)">
      <div class="queue-num">${i+1}</div>
      ${cover?`<img class="queue-cover" src="${cover}" loading="lazy" onerror="this.style.display='none'">`:`<div class="queue-cover-fb">🎮</div>`}
      <div class="queue-info">
        <div class="queue-title">${g.title}</div>
        <div class="queue-meta">${sys} · <span style="color:${statusColor}">${statusLabel}</span></div>
      </div>
      <div class="drag-handle" style="touch-action:none">⠿</div>
      <button class="ibt done" onclick="markPlaying('${g.id}')" title="Oynuyor yap">▶</button>
      <button class="ibt del" onclick="removeFromQueue('${g.id}')" title="Sıradan çıkar">✕</button>
    </div>`;
  }).join('');
}

// ── Drag & Drop (Mouse + Touch) ──────────────────────────────
let dragSrcEl=null, touchClone=null, touchOffsetX=0, touchOffsetY=0;

function dragStart(e,id){
  dragSrcId=id;
  dragSrcEl=e.currentTarget;
  dragSrcEl.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function dragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.queue-item').forEach(el=>el.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}
function dragEnd(e){
  e.target.classList.remove('dragging');
  document.querySelectorAll('.queue-item').forEach(el=>el.classList.remove('drag-over'));
  dragSrcEl=null;
}
async function drop(e,targetId){
  e.preventDefault();
  if(dragSrcId===targetId)return;
  await reorder(dragSrcId,targetId);
  dragSrcId=null;
}

async function reorder(srcId,targetId){
  const srcIdx=QUEUE.findIndex(g=>g.id===srcId);
  const tgtIdx=QUEUE.findIndex(g=>g.id===targetId);
  if(srcIdx<0||tgtIdx<0)return;
  const [moved]=QUEUE.splice(srcIdx,1);
  QUEUE.splice(tgtIdx,0,moved);
  renderQueue();
  await Promise.all(QUEUE.map((g,i)=>api(`games?id=eq.${g.id}`,'PATCH',{play_order:i+1})));
}

// Touch support
function touchStart(e,id){
  dragSrcId=id;
  dragSrcEl=e.currentTarget;
  const t=e.touches[0];
  const rect=dragSrcEl.getBoundingClientRect();
  touchOffsetX=t.clientX-rect.left;
  touchOffsetY=t.clientY-rect.top;
  // Clone for visual feedback
  touchClone=dragSrcEl.cloneNode(true);
  touchClone.style.cssText=`position:fixed;z-index:9999;width:${rect.width}px;opacity:0.85;pointer-events:none;border:1px solid var(--accent);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.5);left:${rect.left}px;top:${rect.top}px;transition:none`;
  document.body.appendChild(touchClone);
  dragSrcEl.style.opacity='0.3';
  e.preventDefault();
}

function touchMove(e){
  if(!touchClone)return;
  e.preventDefault();
  const t=e.touches[0];
  touchClone.style.left=(t.clientX-touchOffsetX)+'px';
  touchClone.style.top=(t.clientY-touchOffsetY)+'px';
  // Find element under touch
  touchClone.style.display='none';
  const el=document.elementFromPoint(t.clientX,t.clientY);
  touchClone.style.display='';
  const target=el?.closest('.queue-item');
  document.querySelectorAll('.queue-item').forEach(el=>el.classList.remove('drag-over'));
  if(target&&target!==dragSrcEl)target.classList.add('drag-over');
}

async function touchEnd(e){
  if(!touchClone)return;
  touchClone.remove();
  touchClone=null;
  if(dragSrcEl)dragSrcEl.style.opacity='';
  const t=e.changedTouches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const target=el?.closest('.queue-item');
  document.querySelectorAll('.queue-item').forEach(el=>el.classList.remove('drag-over'));
  if(target&&target!==dragSrcEl){
    const targetId=target.dataset.id;
    if(targetId&&targetId!==dragSrcId)await reorder(dragSrcId,targetId);
  }
  dragSrcId=null;
  dragSrcEl=null;
}

// Game search
let searchTimeout;
function searchGames(q){
  clearTimeout(searchTimeout);
  const sug=document.getElementById('suggestions');
  if(!q){sug.style.display='none';return;}
  searchTimeout=setTimeout(()=>{
    const results=LIBRARY.filter(g=>g.title.toLowerCase().includes(q.toLowerCase())&&!(QUEUE.find(qi=>qi.id===g.id))).slice(0,8);
    if(!results.length){sug.style.display='none';return;}
    sug.innerHTML=results.map(g=>{
      const cover=g.primary_cover_url||'';
      const sys=g.game_platforms?.map(p=>p.systems?.name).filter(Boolean).join(', ')||'?';
      return`<div class="suggestion-item" onclick="addToQueue('${g.id}')">
        ${cover?`<img src="${cover}" onerror="this.style.display='none'">`:'<div style="width:32px;height:44px;background:var(--bg-1);border-radius:4px;display:flex;align-items:center;justify-content:center">🎮</div>'}
        <div class="suggestion-info"><div class="s-title">${g.title}</div><div class="s-meta">${sys}</div></div>
      </div>`;
    }).join('');
    sug.style.display='block';
  },200);
}

async function addToQueue(id){
  const nextOrder=QUEUE.length+1;
  await api(`games?id=eq.${id}`,'PATCH',{play_order:nextOrder});
  document.getElementById('game-search').value='';
  document.getElementById('suggestions').style.display='none';
  load();
}

async function removeFromQueue(id){
  await api(`games?id=eq.${id}`,'PATCH',{play_order:null});
  // Reorder remaining
  QUEUE=QUEUE.filter(g=>g.id!==id);
  await Promise.all(QUEUE.map((g,i)=>api(`games?id=eq.${g.id}`,'PATCH',{play_order:i+1})));
  load();
}

async function markPlaying(id){
  await api(`games?id=eq.${id}`,'PATCH',{play_status:'playing'});
  const g=QUEUE.find(x=>x.id===id);
  if(g)g.play_status='playing';
  renderQueue();
}

// Close suggestions on outside click
document.addEventListener('click',e=>{
  if(!e.target.closest('.add-section'))document.getElementById('suggestions').style.display='none';
});

load();
</script>
</body>
</html>
