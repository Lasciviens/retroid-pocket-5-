<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Oynama Sırası — RP5 Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
  /* === TEMA DEĞİŞKENLERİ === */
  :root {
    --bg-1: #0a0e1a;
    --bg-2: #131829;
    --bg-3: #1c2238;
    --accent: #ff4655;
    --accent-2: #00d4ff;
    --gold: #ffb347;
    --green: #2ecc71;
    --text: #e8eaf0;
    --muted: #8c93a8;
    --border: #2a3149;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg-1);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
    /* Sürtünmesiz dokunmatik kaydırma */
    -webkit-overflow-scrolling: touch;
  }

  /* Dekoratif izgara arka planı */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
    pointer-events: none;
  }

  /* Parlak küre efektleri */
  .orb {
    position: fixed; border-radius: 50%;
    filter: blur(80px); opacity: 0.1;
    pointer-events: none; z-index: 0;
  }
  .orb-1 { width: 400px; height: 400px; background: var(--accent); top: -150px; left: -100px; }
  .orb-2 { width: 350px; height: 350px; background: var(--accent-2); bottom: -100px; right: -80px; }

  /* === ANA KONTEYNER === */
  .container {
    position: relative; z-index: 1;
    max-width: 860px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 20px;
  }

  /* === BAŞLIK ALANI === */
  header {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }

  .back-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 14px;
    color: var(--muted); text-decoration: none;
    font-size: 13px; transition: all 0.2s; white-space: nowrap;
  }
  .back-btn:hover { border-color: var(--accent-2); color: var(--accent-2); }

  .header-icon {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, var(--gold), #e67e22);
    border-radius: 12px; display: flex;
    align-items: center; justify-content: center;
    font-size: 22px; box-shadow: 0 0 20px rgba(255,179,71,0.3);
  }

  h1 { font-size: clamp(18px, 3vw, 26px); font-weight: 800; }
  h1 span {
    background: linear-gradient(90deg, var(--gold), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .subtitle { color: var(--muted); font-size: 12px; margin-top: 2px; }

  /* Sıra linki */
  .queue-link {
    margin-left: auto;
    background: linear-gradient(135deg, var(--gold), #e67e22);
    border: none; border-radius: 10px;
    color: #000; font-family: inherit;
    font-size: 12px; font-weight: 700;
    padding: 8px 16px; cursor: pointer;
    text-decoration: none; display: inline-flex;
    align-items: center; gap: 6px;
    transition: opacity 0.2s;
  }
  .queue-link:hover { opacity: 0.85; }

  /* === STATS BAR === */
  .stats-bar {
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .stat-pill {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 999px; padding: 6px 14px;
    font-size: 12px; display: flex; align-items: center; gap: 6px;
  }
  .stat-pill .num { font-weight: 800; font-size: 15px; }
  .stat-pill.s-total .num { color: var(--accent-2); }
  .stat-pill.s-playing .num { color: var(--gold); }

  /* === ARAMA KUTUSU === */
  .search-panel {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px; position: relative;
  }
  .search-panel-title {
    font-size: 12px; font-weight: 700;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 12px;
  }
  .search-row { display: flex; gap: 8px; }

  input[type="text"], select {
    background: var(--bg-3); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: inherit; font-size: 14px;
    padding: 10px 14px; outline: none;
    transition: border-color 0.2s; width: 100%;
  }
  input[type="text"]:focus, select:focus { border-color: var(--accent-2); }

  .add-btn {
    background: linear-gradient(135deg, var(--gold), #e67e22);
    border: none; border-radius: 10px;
    color: #000; font-family: inherit;
    font-size: 13px; font-weight: 700;
    padding: 10px 20px; cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .add-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .add-btn:active { transform: translateY(0); }

  /* Arama sonuçları açılır kutusu */
  .search-results {
    position: absolute; left: 18px; right: 18px;
    background: var(--bg-3); border: 1px solid var(--accent-2);
    border-radius: 10px; margin-top: 4px;
    z-index: 50; overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    display: none; /* JS ile gösterilir */
  }
  .search-result-item {
    padding: 10px 14px; cursor: pointer;
    font-size: 13px; display: flex;
    align-items: center; gap: 10px;
    transition: background 0.15s;
  }
  .search-result-item:hover { background: rgba(0,212,255,0.08); }
  .search-result-item .r-system {
    font-size: 10px; font-weight: 700;
    color: var(--accent-2); background: rgba(0,212,255,0.1);
    padding: 2px 6px; border-radius: 4px; white-space: nowrap;
  }
  .search-result-item .r-title { flex: 1; }
  .search-result-item .r-year { color: var(--muted); font-size: 11px; }
  .no-results { padding: 12px 14px; color: var(--muted); font-size: 13px; }

  /* === BOŞ DURUM === */
  .empty-state {
    text-align: center; padding: 60px 24px;
    color: var(--muted); font-size: 14px;
    background: var(--bg-2); border: 1px dashed var(--border);
    border-radius: 16px;
  }
  .empty-state .icon { font-size: 42px; margin-bottom: 14px; }

  /* === SIRA LİSTESİ BAŞLIK SATIRI === */
  .list-header {
    display: flex; align-items: center;
    justify-content: space-between; gap: 12px;
    flex-wrap: wrap;
  }
  .list-title {
    font-size: 13px; font-weight: 700;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .clear-btn {
    background: transparent; border: 1px solid rgba(255,70,85,0.3);
    border-radius: 8px; color: var(--accent);
    font-family: inherit; font-size: 11px;
    font-weight: 700; padding: 5px 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .clear-btn:hover { background: rgba(255,70,85,0.1); }

  /* === SIRA LİSTESİ === */
  .queue-list {
    display: flex; flex-direction: column; gap: 6px;
    /* Sürükle-bırak sırasında taşma olmaması için */
    position: relative;
  }

  /* Tek bir sıra öğesi — yatay geniş kart */
  .queue-item {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 12px; display: flex;
    align-items: center; gap: 0;
    transition: border-color 0.2s, box-shadow 0.2s, opacity 0.15s;
    user-select: none; /* Sürüklerken metin seçilmesin */
    position: relative; overflow: hidden;
  }
  /* İlk öğe = NOW PLAYING vurgusu */
  .queue-item.now-playing {
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(255,179,71,0.2);
  }
  /* Sürükleme sırasında görsel geri bildirim */
  .queue-item.dragging {
    opacity: 0.4; border-style: dashed;
  }
  /* Bırakma hedefi vurgulama */
  .queue-item.drag-over {
    border-color: var(--accent-2);
    box-shadow: 0 0 0 2px var(--accent-2);
  }

  /* Sürükleme tutamacı */
  .drag-handle {
    width: 40px; min-width: 40px; height: 100%;
    display: flex; align-items: center;
    justify-content: center; cursor: grab;
    color: var(--border); font-size: 18px;
    padding: 14px 0; transition: color 0.2s;
    touch-action: none; /* Touch sürüklemeyi etkinleştir */
  }
  .drag-handle:hover { color: var(--muted); }
  .drag-handle:active { cursor: grabbing; }

  /* Küçük boxart thumbnail */
  .item-thumb {
    width: 50px; min-width: 50px; height: 70px;
    border-radius: 6px; overflow: hidden;
    background: var(--bg-3);
    position: relative;
  }
  .item-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  /* Resim yüklenemezse sistem + başlık göster */
  .item-thumb-fallback {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 8px; color: var(--muted);
    text-align: center; padding: 4px;
    line-height: 1.2;
  }
  .item-thumb-fallback .fb-sys {
    font-size: 9px; font-weight: 700;
    color: var(--accent-2); margin-bottom: 2px;
  }

  /* Öğe bilgi bölümü */
  .item-info {
    flex: 1; padding: 10px 12px;
    min-width: 0; /* flex shrink için */
  }
  .item-title {
    font-size: 14px; font-weight: 700;
    line-height: 1.3; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .item-meta {
    display: flex; align-items: center;
    gap: 6px; margin-top: 5px; flex-wrap: wrap;
  }
  .item-badge {
    font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge-sys { background: rgba(0,212,255,0.12); color: var(--accent-2); }
  .badge-year { background: var(--bg-3); color: var(--muted); border: 1px solid var(--border); }
  /* İlk öğe için "NOW PLAYING" etiketi */
  .badge-now {
    background: linear-gradient(90deg, var(--gold), #e67e22);
    color: #000; font-size: 9px;
  }

  /* Öğe sıra numarası */
  .item-rank {
    font-size: 11px; font-weight: 800;
    color: var(--border); min-width: 20px;
    text-align: right; padding-right: 2px;
  }

  /* Silme butonu */
  .del-btn {
    background: transparent; border: none;
    color: var(--muted); font-size: 15px;
    cursor: pointer; padding: 10px 14px;
    border-radius: 6px; transition: color 0.2s, background 0.2s;
    line-height: 1; min-height: 44px; min-width: 44px;
    display: flex; align-items: center; justify-content: center;
  }
  .del-btn:hover { color: var(--accent); background: rgba(255,70,85,0.08); }

  /* Sayı rozeti — sıra numarası */
  .rank-num {
    display: flex; align-items: center; justify-content: center;
    width: 28px; min-width: 28px;
    font-size: 12px; font-weight: 800;
    color: var(--muted); /* varsayılan gri */
  }
  /* İlk öğe altın renkli */
  .queue-item.now-playing .rank-num { color: var(--gold); }

  footer {
    text-align: center; color: var(--muted);
    font-size: 11px; padding-bottom: 8px;
  }

  /* === TOAST BİLDİRİMİ === */
  @keyframes toastIn  { from { opacity:0; transform:translateX(-50%) translateY(16px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
  @keyframes toastOut { from { opacity:1; } to { opacity:0; } }

  /* === MOBİL BREAKPOINT 480px === */
  @media (max-width: 480px) {
    body { padding: 12px; }
    .header-icon { width: 38px; height: 38px; font-size: 18px; }
    h1 { font-size: 18px; }
    /* Kaydırılabilir stats bar */
    .stats-bar { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
    .stat-pill { flex-shrink: 0; }
    /* Arama satırı dikey */
    .search-row { flex-direction: column; }
    .add-btn { width: 100%; }
    /* Küçük thumbnail mobilde biraz geniş */
    .item-thumb { width: 44px; min-width: 44px; height: 62px; }
    .item-title { font-size: 13px; }
    /* Drag handle mobilde daha büyük dokunma hedefi */
    .drag-handle { width: 36px; min-width: 36px; }
    .del-btn { padding: 8px 10px; min-width: 40px; }
  }
</style>
</head>

<div class="orb orb-1"></div>

<div class="container">

  <header>
    <a class="back-btn" href="index.html">← Hub</a>

  <div class="stats-bar">

    <div class="stat-pill s-playing"><span class="num" id="statNow">—</span> Şu an</div>
  </div>

        <div class="search-results" id="searchResults"></div>
      </div>
    </div>
  </div>

  <!-- === SIRA LİSTESİ BAŞLIĞI === -->
  <div class="list-header">
    <span class="list-title">Sıradaki Oyunlar</span>
    <button class="clear-btn" onclick="clearAll()">Tümünü Temizle</button>

  <footer>Veriler bu tarayıcıda yerel olarak saklanır · Retroid Pocket 5 Hub</footer>

</div>

/* === localStorage YARDIMCI FONKSİYONLAR === */
const QUEUE_KEY = 'rp5_queue';

/* Kuyruğu localStorage'dan oku */
function loadQueue() {
  return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]');
}

/* Kuyruğu localStorage'a yaz */
function saveQueue(q) {
  localStorage.setItem(QUEUE_KEY, JSON.stringify(q));
}

/* === KUYRUK ÖĞESI EKLEME ===
   Library'den eklenenler tam nesneyle gelir; arama ile eklenenlerde img boş olabilir */
function addToQueue(game) {
  const q = loadQueue();
  /* Aynı oyun zaten sıradaysa bildiri ver, ekleme */
  if (q.some(x => x.title === game.title)) {
    showToast('Zaten sırada!', '#f39c12');
    return;
  }
  q.push({ id: Date.now(), title: game.title, system: game.system, img: game.img || '', year: game.year || '' });
  saveQueue(q);
  render();
  showToast('Sıraya eklendi ✓');
}

/* === KUYRUKTAN ÇIKARMA === */
function removeFromQueue(id) {
  saveQueue(loadQueue().filter(x => x.id !== id));
  render();
}

/* === TÜM KUYRUĞU TEMİZLE === */
function clearAll() {
  if (!loadQueue().length) return;
  if (!confirm('Tüm sıra silinsin mi?')) return;
  saveQueue([]);
  render();
}

/* === ARAMA: GAMES_INDEX içinde filtrele, sonuçları göster === */
const searchInput   = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (q.length < 1) { searchResults.style.display = 'none'; return; }

  /* En fazla 8 eşleşen oyunu göster */
  const matches = GAMES_INDEX
    .filter(g => g.title.toLowerCase().includes(q) || g.system.toLowerCase().includes(q))
    .slice(0, 8);

  if (!matches.length) {
    searchResults.innerHTML = '<div class="no-results">Sonuç bulunamadı</div>';
  } else {
    searchResults.innerHTML = matches.map(g => `
      <div class="search-result-item" onclick="pickGame(${GAMES_INDEX.indexOf(g)})">
        <span class="r-system">${g.system}</span>
        <span class="r-title">${escHtml(g.title)}</span>
        <span class="r-year">${g.year}</span>
      </div>
    `).join('');
  }
  searchResults.style.display = 'block';
});

/* Kullanıcı sonuç listesinden oyun seçti */
function pickGame(idx) {
  addToQueue(GAMES_INDEX[idx]);
  searchInput.value = '';
  searchResults.style.display = 'none';
}

/* Kutu dışına tıklayınca sonuçları kapat */
document.addEventListener('click', e => {
  if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
    searchResults.style.display = 'none';
  }
});

/* === SÜRÜKLE-BIRAK (vanilla, masaüstü + dokunmatik) ===
   Her öğedeki ≡ tutamacı ile yukarı/aşağı taşıma.
   HTML5 drag API mobilde çalışmaz, bu yüzden mouse + touch events kullanıyoruz. */

let dragState = null; /* Aktif sürükleme durumu */

/* Sürükleme başlangıcı — mouse veya touch olabilir */
function onDragStart(e, itemEl) {
  /* Sürüklenen öğenin mevcut sırası */
  const list = document.getElementById('queueList');
  const items = [...list.querySelectorAll('.queue-item')];
  const fromIndex = items.indexOf(itemEl);

  /* Orijinal öğeyi soluk göster */
  itemEl.classList.add('dragging');

  /* Hayalet kopya oluştur — kullanıcının parmağı/mouseu ile hareket eder */
  const ghost = itemEl.cloneNode(true);
  ghost.style.cssText = `
    position:fixed; pointer-events:none; z-index:1000;
    width:${itemEl.offsetWidth}px; opacity:0.85;
    border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,0.5);
    transition:none;
  `;
  document.body.appendChild(ghost);

  /* Başlangıç koordinatları */
  const startY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
  const startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
  ghost.style.top  = (itemEl.getBoundingClientRect().top)  + 'px';
  ghost.style.left = (itemEl.getBoundingClientRect().left) + 'px';

  dragState = { fromIndex, itemEl, ghost, startY, startX, list, items };
}

/* Sürükleme devam ediyor — ghost'u imleç/parmakla birlikte hareket ettir */
function onDragMove(e) {
  if (!dragState) return;
  e.preventDefault(); /* Sayfanın kaymasını engelle (touch için kritik) */

  const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
  const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
  const dy = clientY - dragState.startY;
  const dx = clientX - dragState.startX;

  /* Ghost'u hareket ettir */
  const orig = dragState.itemEl.getBoundingClientRect();
  dragState.ghost.style.top  = (orig.top  + dy) + 'px';
  dragState.ghost.style.left = (orig.left + dx) + 'px';

  /* Hangi öğenin üzerinde durulduğunu bul (drag-over vurgulaması) */
  dragState.items.forEach(el => el.classList.remove('drag-over'));
  const target = findTargetItem(clientY, dragState.items, dragState.itemEl);
  if (target && target !== dragState.itemEl) target.classList.add('drag-over');
}

/* Sürükleme bitti — öğeyi yeni konuma bırak */
function onDragEnd(e) {
  if (!dragState) return;
  const { fromIndex, itemEl, ghost, list, items } = dragState;

  const clientY = e.type === 'touchend' ? e.changedTouches[0].clientY : e.clientY;

  /* Hedef öğeyi bul ve sırayı güncelle */
  const target = findTargetItem(clientY, items, itemEl);
  const toIndex = target ? items.indexOf(target) : fromIndex;

  if (toIndex !== fromIndex) {
    /* localStorage'daki diziyi yeniden sırala */
    const q = loadQueue();
    const [moved] = q.splice(fromIndex, 1);
    q.splice(toIndex, 0, moved);
    saveQueue(q);
  }

  /* Temizlik */
  ghost.remove();
  itemEl.classList.remove('dragging');
  items.forEach(el => el.classList.remove('drag-over'));
  dragState = null;

  render();
}

/* clientY konumuna göre en yakın öğeyi döndür */
function findTargetItem(clientY, items, exclude) {
  let closest = null, minDist = Infinity;
  items.forEach(el => {
    if (el === exclude) return;
    const rect = el.getBoundingClientRect();
    const mid  = rect.top + rect.height / 2;
    const dist = Math.abs(clientY - mid);
    if (dist < minDist) { minDist = dist; closest = el; }
  });
  return closest;
}

/* Mouse sürükleme dinleyicileri (document seviyesinde) */
document.addEventListener('mousemove', onDragMove);
document.addEventListener('mouseup',   onDragEnd);
/* Touch sürükleme dinleyicileri — passive:false, preventDefault için zorunlu */
document.addEventListener('touchmove', onDragMove, { passive: false });
document.addEventListener('touchend',  onDragEnd);

/* === HTML KAÇIŞ YARDIMCISI (XSS koruması) === */
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* === TOAST BİLDİRİMİ === */
function showToast(msg, color = '#2ecc71') {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = `
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(0);
    background:${color}; color:#000; font-weight:700;
    padding:10px 20px; border-radius:999px; font-size:13px;
    z-index:9999; animation:toastIn 0.2s ease, toastOut 0.3s ease 1.8s forwards;
    pointer-events:none;
  `;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

/* === ANA RENDER FONKSİYONU ===
   Tüm kuyruk öğelerini çizer, istatistikleri günceller,
   drag-handle event listener'larını bağlar. */
function render() {
  const q    = loadQueue();
  const list = document.getElementById('queueList');

  /* İstatistikleri güncelle */
  document.getElementById('statTotal').textContent = q.length;
  document.getElementById('statNow').textContent   = q.length ? escHtml(q[0].title) : '—';

  if (!q.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="icon">🎮</div>
        Sıra boş. Kütüphaneden veya aramadan oyun ekle!
      </div>`;
    return;
  }

  /* Her öğeyi yatay geniş kart olarak render et */
  list.innerHTML = q.map((item, i) => `
    <div class="queue-item ${i === 0 ? 'now-playing' : ''}"
         data-id="${item.id}">

      <!-- Sürükleme tutamacı -->
      <div class="drag-handle" title="Sürükle">≡</div>

      <!-- Sıra numarası -->
      <div class="rank-num">${i + 1}</div>

      <!-- Küçük boxart resmi -->
      <div class="item-thumb">
        ${item.img
          ? `<img src="${escHtml(item.img)}" alt="${escHtml(item.title)}" loading="lazy"
                  onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
             <div class="item-thumb-fallback" style="display:none;">
               <div class="fb-sys">${escHtml(item.system)}</div>
               <small>${escHtml(item.title.slice(0,20))}</small>
             </div>`
          : `<div class="item-thumb-fallback" style="display:flex;">
               <div class="fb-sys">${escHtml(item.system)}</div>
               <small>${escHtml(item.title.slice(0,20))}</small>
             </div>`
        }
      </div>

      <!-- Oyun bilgileri -->
      <div class="item-info">
        <div class="item-title">${escHtml(item.title)}</div>
        <div class="item-meta">
          <span class="item-badge badge-sys">${escHtml(item.system)}</span>
          ${item.year ? `<span class="item-badge badge-year">${item.year}</span>` : ''}
          ${i === 0 ? '<span class="item-badge badge-now">▶ Now Playing</span>' : ''}
        </div>
      </div>

      <!-- Sil butonu -->
      <button class="del-btn" onclick="removeFromQueue(${item.id})" title="Kaldır">✕</button>
    </div>
  `).join('');

  /* Drag handle'lara mouse + touch başlangıç dinleyicilerini bağla */
  list.querySelectorAll('.queue-item').forEach((itemEl) => {
    const handle = itemEl.querySelector('.drag-handle');
    /* Mouse */
    handle.addEventListener('mousedown', e => { e.preventDefault(); onDragStart(e, itemEl); });
    /* Touch */
    handle.addEventListener('touchstart', e => { e.preventDefault(); onDragStart(e, itemEl); }, { passive: false });
  });
}

/* Sayfa yüklenince kuyruğu çiz */
render();
</script>
