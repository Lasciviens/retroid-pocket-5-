<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İstek Takibi — Retroid RP5</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--bg-1:#0a0e1a;--bg-2:#131829;--bg-3:#1c2238;--accent:#00d4ff;--gold:#ffb347;--good:#2ecc71;--warn:#f39c12;--bad:#e74c3c;--purple:#a855f7;--text:#e8eaf0;--muted:#8c93a8;--border:#2a3149}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,var(--bg-1),var(--bg-2));color:var(--text);min-height:100vh;padding:20px}
header{text-align:center;margin-bottom:24px;padding:22px 20px;background:linear-gradient(135deg,rgba(0,212,255,.1),rgba(168,85,247,.1));border:1px solid var(--border);border-radius:16px}
h1{font-size:1.9rem;background:linear-gradient(90deg,var(--accent),var(--purple));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;letter-spacing:-1px}
.subtitle{color:var(--muted);font-size:.9rem}
.quick-links{display:flex;justify-content:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.quick-links a{background:var(--bg-3);border:1px solid var(--border);color:var(--accent);padding:6px 12px;border-radius:8px;text-decoration:none;font-size:.8rem;font-weight:600;transition:all .2s}
.quick-links a:hover{border-color:var(--accent)}
.helper-note{margin-top:10px;font-size:.78rem;color:var(--muted)}
.add-section{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px}
.add-section h3{font-size:.9rem;font-weight:700;color:var(--accent);margin-bottom:12px}
.form-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
input,select{background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:.88rem;font-family:inherit}
input:focus,select:focus{outline:none;border-color:var(--accent)}
.btn{background:var(--accent);color:var(--bg-1);border:none;border-radius:8px;padding:9px 16px;font-size:.88rem;cursor:pointer;font-weight:700;transition:all .2s;white-space:nowrap}
.btn:hover{opacity:.85}
.stats{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.stat-pill{background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:.78rem;color:var(--muted)}
.stat-pill span{font-weight:700;color:var(--accent)}
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.fbtn{background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:7px 11px;color:var(--muted);font-size:.78rem;cursor:pointer;font-weight:500;transition:all .2s}
.fbtn:hover,.fbtn.active{border-color:var(--accent);color:var(--accent)}
.search-inp{background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:.85rem;width:180px}
.search-inp:focus{outline:none;border-color:var(--accent)}
.utility-btn{background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:7px 11px;color:var(--text);font-size:.78rem;cursor:pointer}
.utility-btn:hover{border-color:var(--accent);color:var(--accent)}
.wish-list{display:flex;flex-direction:column;gap:8px}
.wish-item{background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:12px;transition:border-color .2s}
.wish-item:hover{border-color:var(--accent)}
.wish-item.is-done{opacity:.45}
.wish-icon{width:40px;height:40px;border-radius:8px;background:var(--bg-3);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.wish-info{flex:1;min-width:0}
.wish-title{font-size:.92rem;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wish-note{font-size:.78rem;color:var(--muted);margin-bottom:4px}
.wish-badges{display:flex;gap:3px;flex-wrap:wrap}
.badge{font-size:.6rem;padding:2px 6px;border-radius:4px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.b-game{background:rgba(0,212,255,.15);color:var(--accent);border:1px solid rgba(0,212,255,.2)}
.b-emulator{background:rgba(243,156,18,.15);color:var(--warn);border:1px solid rgba(243,156,18,.2)}
.b-feature{background:rgba(168,85,247,.15);color:var(--purple);border:1px solid rgba(168,85,247,.2)}
.b-other{background:var(--bg-3);color:var(--muted);border:1px solid var(--border)}
.b-done{background:rgba(46,204,113,.15);color:var(--good);border:1px solid rgba(46,204,113,.2)}
.b-high{background:rgba(231,76,60,.15);color:var(--bad);border:1px solid rgba(231,76,60,.2)}
.b-medium{background:rgba(243,156,18,.12);color:var(--warn);border:1px solid rgba(243,156,18,.2)}
.b-low{background:var(--bg-3);color:var(--muted);border:1px solid var(--border)}
.wish-actions{display:flex;gap:5px;flex-shrink:0}
.ibt{background:var(--bg-3);border:1px solid var(--border);border-radius:6px;padding:5px 8px;cursor:pointer;font-size:.8rem;color:var(--text);transition:all .2s}
.ibt:hover{border-color:var(--accent)}
.ibt.del:hover{border-color:var(--bad);color:var(--bad)}
.ibt.done{color:var(--good)}
.empty{text-align:center;padding:50px;color:var(--muted)}
.loading{text-align:center;padding:40px;color:var(--muted)}
footer{text-align:center;margin-top:32px;padding:14px;color:var(--muted);font-size:.8rem}
footer a{color:var(--accent);text-decoration:none}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="rp5_auth.js"></script>
</head>
<body>
<header>
  <h1>♡ İSTEK TAKİBİ</h1>
  <p class="subtitle">Eklemek istediğin oyunlar, emülatör ayarları ve özellikler.</p>
  <div class="quick-links">
    <a href="index.html">🏠 Hub</a>
    <a href="Retroid_Library_Dashboard.html">📚 Kütüphane</a>
    <a href="Retroid_Queue.html">🎮 Oynama Sırası</a>
  </div>
  <div data-auth-mount></div>
  <div class="helper-note">Listeyi misafir olarak gorebilirsin. Ekleme, tamamlama ve silme icin log in gerekir.</div>
</header>

<div class="add-section">
  <h3>➕ Yeni İstek Ekle</h3>
  <div class="form-row">
    <input type="text" id="f-title" placeholder="Oyun adı, özellik, not..." style="flex:2;min-width:200px">
    <select id="f-cat">
      <option value="game">🎮 Oyun</option>
      <option value="emulator">⚙️ Emülatör</option>
      <option value="feature">✨ Özellik</option>
      <option value="other">📝 Diğer</option>
    </select>
    <select id="f-prio">
      <option value="high">🔴 Yüksek</option>
      <option value="medium" selected>🟡 Orta</option>
      <option value="low">🟢 Düşük</option>
    </select>
    <input type="text" id="f-note" placeholder="Not (opsiyonel)" style="flex:1;min-width:140px">
    <button class="btn" onclick="addItem()">Ekle</button>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="filters">
  <input type="text" class="search-inp" id="search" placeholder="🔍 Ara...">
  <button class="fbtn active" onclick="setFilter('all',this)">Tümü</button>
  <button class="fbtn" onclick="setFilter('game',this)">🎮 Oyun</button>
  <button class="fbtn" onclick="setFilter('emulator',this)">⚙️ Emülatör</button>
  <button class="fbtn" onclick="setFilter('feature',this)">✨ Özellik</button>
  <button class="fbtn" onclick="setFilter('done',this)">✓ Tamamlanan</button>
  <button class="utility-btn" onclick="clearSearch()">Aramayi Temizle</button>
</div>

<div class="wish-list" id="list"><div class="loading">⏳ Yükleniyor...</div></div>

<footer>Retroid Pocket 5 · <a href="https://lasciviens.github.io/retroid-pocket-5-/">lasciviens.github.io/retroid-pocket-5-/</a></footer>

<script>
const SB='https://bniqmxbtvgwkaoswugds.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuaXFteGJ0dmd3a2Fvc3d1Z2RzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTExMTYsImV4cCI6MjA5MzQyNzExNn0.VXjnGv3uV8A2XfAW5jOBAkxyzc9c9q6adrA64JfwrQs';
const H={headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json'}};

let ALL=[], activeFilter='all', searchQ='';

async function api(ep,method='GET',body=null){
  const opts={...H,method};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(`${SB}/rest/v1/${ep}`,opts);
  const t=await r.text();
  return t?JSON.parse(t):null;
}

async function load(){
  // notes tablosunu istek takibi için kullanıyoruz
  // category: game | emulator | feature | other | done
  // content: "not metni || prio:high"
  ALL=await api('notes?select=*&order=created_at.desc');
  if(!ALL)ALL=[];
  render();
}

function render(){
  const catIcon={game:'🎮',emulator:'⚙️',feature:'✨',other:'📝',done:'✓'};
  const catLabel={game:'Oyun',emulator:'Emülatör',feature:'Özellik',other:'Diğer',done:'Tamamlandı'};
  const prioLabel={high:'Yüksek',medium:'Orta',low:'Düşük'};

  let items=ALL.filter(i=>{
    if(activeFilter==='done')return i.category==='done';
    if(activeFilter!=='all'&&i.category!==activeFilter)return false;
    if(i.category==='done')return false;
    return true;
  });
  if(searchQ)items=items.filter(i=>(i.title+' '+(i.content||'')).toLowerCase().includes(searchQ));

  const pending=ALL.filter(i=>i.category!=='done').length;
  const done=ALL.filter(i=>i.category==='done').length;
  const high=ALL.filter(i=>i.category!=='done'&&(i.content||'').includes('prio:high')).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat-pill">Bekleyen: <span>${pending}</span></div>
    <div class="stat-pill">Tamamlanan: <span>${done}</span></div>
    <div class="stat-pill">🔴 Yüksek öncelik: <span>${high}</span></div>`;

  const list=document.getElementById('list');
  if(!items.length){list.innerHTML='<div class="empty">Kayıt bulunamadı.</div>';return;}

  list.innerHTML=items.map(i=>{
    const prio=(i.content||'').match(/prio:(\w+)/)?.[1]||'medium';
    const note=(i.content||'').replace(/prio:\w+/g,'').trim();
    const isDone=i.category==='done';
    const cat=i.category||'other';
    return`<div class="wish-item${isDone?' is-done':''}">
      <div class="wish-icon">${catIcon[cat]||'📝'}</div>
      <div class="wish-info">
        <div class="wish-title">${i.title}</div>
        ${note?`<div class="wish-note">${note}</div>`:''}
        <div class="wish-badges">
          <span class="badge b-${cat}">${catLabel[cat]||cat}</span>
          ${!isDone?`<span class="badge b-${prio}">${prioLabel[prio]||prio}</span>`:''}
        </div>
      </div>
      <div class="wish-actions">
        ${!isDone?`<button class="ibt done" onclick="markDone('${i.id}')" title="Tamamlandı olarak işaretle">✓</button>`:''}
        <button class="ibt del" onclick="deleteItem('${i.id}')" title="Sil">🗑</button>
      </div>
    </div>`;
  }).join('');
}

async function addItem(){
  if(!(await window.rp5Auth.requireAuth({title:'Yonetici girisi gerekli',message:'Yeni istek eklemek icin yonetici oturumu acik olmali.'}))) return;
  const title=document.getElementById('f-title').value.trim();
  if(!title)return;
  const cat=document.getElementById('f-cat').value;
  const prio=document.getElementById('f-prio').value;
  const note=document.getElementById('f-note').value.trim();
  const content=`${note?note+' ':''}prio:${prio}`;
  await api('notes','POST',[{title,category:cat,content}]);
  document.getElementById('f-title').value='';
  document.getElementById('f-note').value='';
  load();
}

async function markDone(id){
  if(!(await window.rp5Auth.requireAuth({title:'Yonetici girisi gerekli',message:'Istek guncellemek icin yonetici oturumu acik olmali.'}))) return;
  await api(`notes?id=eq.${id}`,'PATCH',{category:'done'});
  load();
}

async function deleteItem(id){
  if(!(await window.rp5Auth.requireAuth({title:'Yonetici girisi gerekli',message:'Istek silmek icin yonetici oturumu acik olmali.'}))) return;
  if(!confirm('Silinsin mi?'))return;
  await api(`notes?id=eq.${id}`,'DELETE');
  load();
}

function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function clearSearch(){
  document.getElementById('search').value='';
  searchQ='';
  render();
}

document.getElementById('search').addEventListener('input',e=>{searchQ=e.target.value.toLowerCase();render();});
document.getElementById('f-title').addEventListener('keydown',e=>{if(e.key==='Enter')addItem();});

load();
</script>
</body>
</html>
