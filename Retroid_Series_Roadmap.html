<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Retroid Series Roadmap</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--bg-1:#0a0e1a;--bg-2:#131829;--bg-3:#1c2238;--accent:#ffb347;--accent-2:#00d4ff;--gold:#ffb347;--good:#2ecc71;--warn:#f39c12;--bad:#e74c3c;--text:#e8eaf0;--muted:#8c93a8;--border:#2a3149}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,var(--bg-1),var(--bg-2));color:var(--text);min-height:100vh;padding:20px}
header{text-align:center;margin-bottom:28px;padding:24px 20px;background:linear-gradient(135deg,rgba(255,179,71,.1),rgba(0,212,255,.1));border:1px solid var(--border);border-radius:16px}
h1{font-size:2rem;background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;letter-spacing:-1px}
.subtitle{color:var(--muted);font-size:.9rem}
.quick-links{display:flex;justify-content:center;gap:8px;margin-top:14px;flex-wrap:wrap}
.quick-links a{background:var(--bg-3);border:1px solid var(--border);color:var(--accent-2);padding:6px 12px;border-radius:8px;text-decoration:none;font-size:.8rem;font-weight:600;transition:all .2s}
.quick-links a:hover{border-color:var(--accent-2)}
.search-box{width:100%;max-width:500px;display:block;margin:0 auto 24px;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:.9rem}
.search-box:focus{outline:none;border-color:var(--accent)}
.series-section{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin-bottom:20px;transition:border-color .2s}
.series-section:hover{border-color:var(--accent)}
.series-section.hidden{display:none}
.series-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;cursor:pointer}
.series-icon{width:42px;height:42px;background:linear-gradient(135deg,rgba(255,179,71,.2),rgba(0,212,255,.2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.series-name{font-size:1.2rem;font-weight:800;color:var(--accent)}
.series-desc{font-size:.8rem;color:var(--muted);margin-top:2px}
.series-count{margin-left:auto;background:var(--bg-3);border:1px solid var(--border);padding:4px 10px;border-radius:6px;font-size:.75rem;color:var(--muted)}
.games-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scrollbar-width:thin}
.games-row::-webkit-scrollbar{height:4px}
.games-row::-webkit-scrollbar-track{background:var(--bg-3)}
.games-row::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.game-chip{flex-shrink:0;background:var(--bg-3);border:1px solid var(--border);border-radius:10px;overflow:hidden;width:130px;cursor:pointer;transition:all .2s;text-decoration:none;display:flex;flex-direction:column}
.game-chip:hover{border-color:var(--accent-2);transform:translateY(-2px)}
.game-chip img{width:100%;height:90px;object-fit:cover}
.game-chip-img-fb{width:100%;height:90px;background:var(--bg-1);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--muted);text-align:center;padding:4px}
.game-chip-body{padding:8px;flex:1;display:flex;flex-direction:column;gap:3px}
.game-chip-title{font-size:.72rem;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--text)}
.game-chip-meta{font-size:.65rem;color:var(--muted)}
.game-chip-badges{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.chip-badge{font-size:.55rem;padding:1px 4px;border-radius:3px;font-weight:700;text-transform:uppercase}
.chip-iconic{background:rgba(255,179,71,.2);color:var(--gold);border:1px solid rgba(255,179,71,.3)}
.chip-coop{background:rgba(46,204,113,.2);color:var(--good);border:1px solid rgba(46,204,113,.3)}
.chip-status-playing{background:rgba(243,156,18,.2);color:var(--warn)}
.chip-status-completed{background:rgba(46,204,113,.2);color:var(--good)}
.chip-status-wishlist{background:rgba(168,85,247,.2);color:#a855f7}
.loading{text-align:center;padding:60px;color:var(--muted)}
footer{text-align:center;margin-top:36px;padding:16px;color:var(--muted);font-size:.8rem}
footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<header>
  <h1>SERİ YOL HARİTASI</h1>
  <p class="subtitle">Her serinin kronolojik oyun listesi — nereden başlamalısın?</p>
  <div class="quick-links">
    <a href="index.html">🏠 Hub</a>
    <a href="Retroid_Library_Dashboard.html">📚 Kütüphane</a>
    <a href="Retroid_Glossary.html">📖 Glossary</a>
    <a href="Retroid_Emulator_Matrix.html">⚙️ Emülatörler</a>
  </div>
</header>

<input type="text" class="search-box" id="search" placeholder="🔍 Seri veya oyun ara...">

<div id="content"><div class="loading">⏳ Yükleniyor...</div></div>

<footer>
  Retroid Pocket 5 · <a href="https://lasciviens.netlify.app">lasciviens.netlify.app</a>
</footer>

<script>
const SB='https://bniqmxbtvgwkaoswugds.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuaXFteGJ0dmd3a2Fvc3d1Z2RzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTExMTYsImV4cCI6MjA5MzQyNzExNn0.VXjnGv3uV8A2XfAW5jOBAkxyzc9c9q6adrA64JfwrQs';
const H={headers:{apikey:KEY,Authorization:`Bearer ${KEY}`}};

const ICONS={'Grand Theft Auto':'🚗','God of War':'⚔️','Pokemon':'🔴','Super Mario':'🍄','Mario Kart':'🏎️','The Legend of Zelda':'🗡️','Sonic the Hedgehog':'💨','Crash Bandicoot':'🐾','Tekken':'👊','Final Fantasy':'💎','Resident Evil':'🧟','Metal Gear':'📦','Kingdom Hearts':'🔑','Jak and Daxter':'🌿','Ratchet & Clank':'🔧','Sly Cooper':'🦝','Metroid':'🚀','Castlevania':'🏰','Persona':'🎭','Devil May Cry':'😈','Pikmin':'🌱','Super Smash Bros.':'🥊','TimeSplitters':'⏱️','Paper Mario':'📄','Mario Party':'🎲','Mario & Luigi':'👨‍🌾','Advance Wars':'🪖','Fire Emblem':'⚔️','Professor Layton':'🎩'};

async function load(){
  const [seriesData, gamesData]=await Promise.all([
    fetch(`${SB}/rest/v1/series?select=id,name,description&order=name`,H).then(r=>r.json()),
    fetch(`${SB}/rest/v1/games?select=id,title,release_year,rating,is_iconic,is_coop,play_status,series_id,game_platforms(cover_url,systems(name))&order=release_year`,H).then(r=>r.json()),
  ]);

  const cont=document.getElementById('content');

  // Sadece kütüphanede oyunu olan serileri göster
  const seriesWithGames=seriesData.filter(s=>gamesData.some(g=>g.series_id===s.id));

  if(!seriesWithGames.length){cont.innerHTML='<div class="loading">Seri bulunamadı.</div>';return;}

  cont.innerHTML=seriesWithGames.map(s=>{
    const games=gamesData.filter(g=>g.series_id===s.id).sort((a,b)=>(a.release_year||9999)-(b.release_year||9999));
    const icon=ICONS[s.name]||'🎮';
    const gamesHtml=games.map(g=>{
      const cover=g.game_platforms?.[0]?.cover_url||'';
      const sys=g.game_platforms?.map(p=>p.systems?.name).filter(Boolean).join('/');
      const statusBadge=g.play_status==='playing'?'<span class="chip-badge chip-status-playing">Oynuyor</span>':
                        g.play_status==='completed'?'<span class="chip-badge chip-status-completed">Bitti</span>':
                        g.play_status==='wishlist'?'<span class="chip-badge chip-status-wishlist">♡ İstek</span>':'';
      return`<a class="game-chip" href="Retroid_Library_Dashboard.html" title="${g.title}">
        ${cover?`<img src="${cover}" loading="lazy" onerror="this.style.display='none'">`:`<div class="game-chip-img-fb">${sys||'?'}</div>`}
        <div class="game-chip-body">
          <div class="game-chip-title">${g.title}</div>
          <div class="game-chip-meta">${sys||'?'} ${g.release_year?'· '+g.release_year:''}</div>
          <div class="game-chip-badges">
            ${g.is_iconic?'<span class="chip-badge chip-iconic">★ Kült</span>':''}
            ${g.is_coop?'<span class="chip-badge chip-coop">2P</span>':''}
            ${statusBadge}
          </div>
        </div>
      </a>`;
    }).join('');
    return`<div class="series-section" data-search="${s.name.toLowerCase()} ${games.map(g=>g.title.toLowerCase()).join(' ')}">
      <div class="series-header">
        <div class="series-icon">${icon}</div>
        <div>
          <div class="series-name">${s.name}</div>
          ${s.description?`<div class="series-desc">${s.description}</div>`:''}
        </div>
        <div class="series-count">${games.length} oyun</div>
      </div>
      <div class="games-row">${gamesHtml}</div>
    </div>`;
  }).join('');
}

document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  document.querySelectorAll('.series-section').forEach(s=>{
    s.classList.toggle('hidden',!!q&&!s.dataset.search.includes(q));
  });
});

load();
</script>
</body>
</html>
