<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Admin — Oyun Ekle/Düzenle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--bg-1:#0a0e1a;--bg-2:#131829;--bg-3:#1c2238;--accent:#ff4655;--accent-2:#00d4ff;--good:#2ecc71;--warn:#f39c12;--text:#e8eaf0;--muted:#8c93a8;--border:#2a3149}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg-1);color:var(--text);min-height:100vh;padding:24px}
h1{font-size:1.6rem;background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.nav{margin-bottom:24px}
.nav a{color:var(--accent-2);text-decoration:none;font-size:.85rem}
.tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:10px 18px;background:none;border:none;color:var(--muted);font-size:.9rem;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.tab.active{color:var(--accent-2);border-bottom-color:var(--accent-2)}
.panel{display:none}.panel.active{display:block}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:860px}
.form-grid .full{grid-column:1/-1}
label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
input,select,textarea{width:100%;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:.9rem;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent-2)}
textarea{resize:vertical;min-height:80px}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:11px 22px;font-size:.9rem;cursor:pointer;font-weight:600;transition:all .2s}
.btn:hover{opacity:.85}
.btn.secondary{background:var(--bg-3);border:1px solid var(--border);color:var(--text)}
.section-title{font-size:1rem;font-weight:700;color:var(--accent-2);margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.platform-entry{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;position:relative}
.platform-entry .remove{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem}
.platform-entry .remove:hover{color:var(--accent)}
.add-platform-btn{background:var(--bg-3);border:1px dashed var(--border);border-radius:8px;padding:10px;width:100%;color:var(--accent-2);cursor:pointer;font-size:.85rem;margin-bottom:16px;transition:all .2s}
.add-platform-btn:hover{border-color:var(--accent-2)}
.msg{padding:12px 16px;border-radius:8px;margin-top:14px;font-size:.9rem;display:none}
.msg.ok{background:rgba(46,204,113,.15);border:1px solid rgba(46,204,113,.3);color:var(--good)}
.msg.err{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.3);color:#e74c3c}
.game-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-top:16px}
.game-item{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.game-item img{width:40px;height:55px;object-fit:cover;border-radius:4px;background:var(--bg-3)}
.game-item-info{flex:1;min-width:0}
.game-item-title{font-size:.9rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-item-meta{font-size:.75rem;color:var(--muted);margin-top:2px}
.game-item-actions{display:flex;gap:6px}
.icon-btn{background:var(--bg-3);border:1px solid var(--border);border-radius:6px;padding:5px 8px;cursor:pointer;font-size:.8rem;color:var(--text);transition:all .2s}
.icon-btn:hover{border-color:var(--accent-2)}
.icon-btn.del:hover{border-color:var(--accent);color:var(--accent)}
.search-filter{background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:.9rem;width:100%;max-width:400px;margin-bottom:14px}
.loading{color:var(--muted);padding:20px;text-align:center}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="nav"><a href="Retroid_Library_Dashboard.html">← Kütüphaneye Dön</a></div>
<h1>🎮 Admin Panel</h1>
<p style="color:var(--muted);font-size:.85rem;margin-bottom:20px">Oyun ekle, düzenle veya sil.</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('add')">➕ Yeni Oyun Ekle</button>
  <button class="tab" onclick="switchTab('list')">📋 Oyun Listesi</button>
</div>

<!-- ADD PANEL -->
<div class="panel active" id="tab-add">
  <form id="add-form" onsubmit="submitGame(event)">
    <div class="form-grid">
      <div class="full"><label>Oyun Adı *</label><input type="text" id="f-title" required placeholder="The Legend of Zelda: Ocarina of Time"></div>
      <div><label>Çıkış Yılı</label><input type="number" id="f-year" min="1970" max="2030" placeholder="1998"></div>
      <div><label>Geliştirici</label><input type="text" id="f-developer" placeholder="Nintendo"></div>
      <div><label>Seri</label><select id="f-series"><option value="">— Seri Yok —</option></select></div>
      <div><label>Rating (1-10)</label><input type="number" id="f-rating" min="1" max="10" placeholder="9"></div>
      <div style="display:flex;align-items:center;gap:12px;padding-top:20px">
        <label style="margin:0;display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" id="f-coop" style="width:auto"> Co-op
        </label>
        <label style="margin:0;display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" id="f-iconic" style="width:auto"> Kült Klasik ★
        </label>
      </div>
      <div class="full"><label>Co-op Notları</label><input type="text" id="f-coop-notes" placeholder="2P split-screen, online 4P..."></div>
      <div class="full"><label>Açıklama</label><textarea id="f-desc" placeholder="Oyun hakkında kısa bilgi..."></textarea></div>
      <div class="full">
        <label>Türler</label>
        <div id="genre-checkboxes" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px"></div>
      </div>
    </div>

    <div class="section-title">🖥️ Platformlar</div>
    <div id="platforms-container"></div>
    <button type="button" class="add-platform-btn" onclick="addPlatform()">+ Platform Ekle</button>

    <div style="display:flex;gap:10px;margin-top:4px">
      <button type="submit" class="btn">💾 Oyunu Kaydet</button>
      <button type="button" class="btn secondary" onclick="resetForm()">↺ Temizle</button>
    </div>
    <div class="msg" id="add-msg"></div>
  </form>
</div>

<!-- LIST PANEL -->
<div class="panel" id="tab-list">
  <input type="text" class="search-filter" id="list-search" placeholder="🔍 Oyun ara..." oninput="filterList()">
  <div id="game-list" class="game-list"><div class="loading">Yükleniyor...</div></div>
</div>

<script>
const SB_URL='https://bniqmxbtvgwkaoswugds.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuaXFteGJ0dmd3a2Fvc3d1Z2RzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTExMTYsImV4cCI6MjA5MzQyNzExNn0.VXjnGv3uV8A2XfAW5jOBAkxyzc9c9q6adrA64JfwrQs';
const H={headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':'application/json'}};

async function api(ep,method='GET',body=null){
  const opts={...H,method};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(`${SB_URL}/rest/v1/${ep}`,opts);
  const t=await r.text();
  return t?JSON.parse(t):[];
}

let SYSTEMS=[],GENRES=[],SERIES=[],EMULATORS=[],ALL_GAMES=[];

async function init(){
  [SYSTEMS,GENRES,SERIES,EMULATORS]=await Promise.all([
    api('systems?select=id,name&order=name'),
    api('genres?select=id,name&order=name'),
    api('series?select=id,name&order=name'),
    api('emulators?select=id,name&order=name'),
  ]);

  // Populate series select
  const serSel=document.getElementById('f-series');
  SERIES.forEach(s=>serSel.innerHTML+=`<option value="${s.id}">${s.name}</option>`);

  // Genre checkboxes
  const gcont=document.getElementById('genre-checkboxes');
  GENRES.forEach(g=>{
    gcont.innerHTML+=`<label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:.8rem;color:var(--text);text-transform:none;letter-spacing:0">
      <input type="checkbox" name="genre" value="${g.id}" style="width:auto"> ${g.name}
    </label>`;
  });

  addPlatform();
}

let platCount=0;
function addPlatform(){
  const c=document.getElementById('platforms-container');
  const idx=platCount++;
  const sysOpts=SYSTEMS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  const emuOpts=EMULATORS.map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
  c.innerHTML+=`<div class="platform-entry" id="plat-${idx}">
    <button type="button" class="remove" onclick="document.getElementById('plat-${idx}').remove()">✕</button>
    <div class="form-grid">
      <div><label>Sistem *</label><select name="sys-${idx}" required><option value="">Seç...</option>${sysOpts}</select></div>
      <div><label>Emülatör</label><select name="emu-${idx}"><option value="">—</option>${emuOpts}</select></div>
      <div><label>Performans</label>
        <select name="perf-${idx}">
          <option value="good">✓ Smooth</option>
          <option value="warn">⚠ Tweak Gerekli</option>
          <option value="bad">✗ Sorunlu</option>
        </select>
      </div>
      <div><label>Bölge</label><select name="region-${idx}"><option value="USA">USA</option><option value="EUR">EUR</option><option value="JAP">JAP</option></select></div>
      <div class="full"><label>Kapak URL (opsiyonel)</label><input type="url" name="cover-${idx}" placeholder="https://..."></div>
      <div class="full"><label>Perf Notu</label><input type="text" name="perfnote-${idx}" placeholder="55+ FPS sabit, vapor chamber devreye girer..."></div>
    </div>
  </div>`;
}

async function submitGame(e){
  e.preventDefault();
  const msg=document.getElementById('add-msg');
  msg.style.display='none';

  const title=document.getElementById('f-title').value.trim();
  const year=document.getElementById('f-year').value;
  const dev=document.getElementById('f-developer').value.trim();
  const seriesId=document.getElementById('f-series').value||null;
  const rating=document.getElementById('f-rating').value;
  const coop=document.getElementById('f-coop').checked;
  const iconic=document.getElementById('f-iconic').checked;
  const coopNotes=document.getElementById('f-coop-notes').value.trim();
  const desc=document.getElementById('f-desc').value.trim();
  const selectedGenres=[...document.querySelectorAll('input[name="genre"]:checked')].map(x=>x.value);

  try{
    // Insert game
    // İlk platform cover'ını primary olarak kullan
    const firstCoverInput=document.querySelector('[name^="cover-"]');
    const firstCover=firstCoverInput?.value?.trim()||null;
    const [game]=await api('games','POST',[{
      title,release_year:year||null,developer:dev||null,series_id:seriesId,
      rating:rating||null,is_coop:coop,is_iconic:iconic,coop_notes:coopNotes||null,
      description:desc||null,play_status:'backlog',primary_cover_url:firstCover
    }]);
    if(!game?.id)throw new Error('Oyun kaydedilemedi');

    // Genres
    if(selectedGenres.length){
      await api('game_genres','POST',selectedGenres.map(gid=>({game_id:game.id,genre_id:gid})));
    }

    // Platforms
    const platEls=document.querySelectorAll('.platform-entry');
    for(const el of platEls){
      const idx=el.id.replace('plat-','');
      const sysId=el.querySelector(`[name="sys-${idx}"]`).value;
      const emuId=el.querySelector(`[name="emu-${idx}"]`).value||null;
      const perf=el.querySelector(`[name="perf-${idx}"]`).value;
      const region=el.querySelector(`[name="region-${idx}"]`).value;
      const cover=el.querySelector(`[name="cover-${idx}"]`).value.trim()||null;
      const perfNote=el.querySelector(`[name="perfnote-${idx}"]`).value.trim()||null;
      if(!sysId)continue;
      await api('game_platforms','POST',[{game_id:game.id,system_id:sysId,emulator_id:emuId,performance:perf,region,cover_url:cover,performance_notes:perfNote}]);
    }

    msg.className='msg ok';
    msg.textContent=`✓ "${title}" başarıyla eklendi!`;
    msg.style.display='block';
    resetForm();
  }catch(err){
    msg.className='msg err';
    msg.textContent='Hata: '+err.message;
    msg.style.display='block';
  }
}

function resetForm(){
  document.getElementById('add-form').reset();
  document.getElementById('platforms-container').innerHTML='';
  platCount=0;
  addPlatform();
}

async function loadList(){
  const games=await api('games?select=id,title,release_year,is_iconic,play_status,primary_cover_url,series(name),game_platforms(systems(name))&order=title');
  ALL_GAMES=games;
  renderList(games);
}

function renderList(list){
  const el=document.getElementById('game-list');
  if(!list.length){el.innerHTML='<div class="loading">Oyun bulunamadı.</div>';return;}
  el.innerHTML=list.map(g=>{
    const cover=g.primary_cover_url||'';
    const sys=g.game_platforms?.map(p=>p.systems?.name).filter(Boolean).join(', ')||'?';
    return`<div class="game-item">
      ${cover?`<img src="${cover}" onerror="this.style.display='none'">`:'<div style="width:40px;height:55px;background:var(--bg-3);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:1.2rem">🎮</div>'}
      <div class="game-item-info">
        <div class="game-item-title">${g.title}${g.is_iconic?' ★':''}</div>
        <div class="game-item-meta">${sys}${g.release_year?' · '+g.release_year:''}${g.series?.name?' · '+g.series.name:''}</div>
      </div>
      <div class="game-item-actions">
        <button class="icon-btn del" onclick="deleteGame('${g.id}','${g.title.replace(/'/g,"\\'")}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function filterList(){
  const q=document.getElementById('list-search').value.toLowerCase();
  renderList(ALL_GAMES.filter(g=>g.title.toLowerCase().includes(q)));
}

async function deleteGame(id,title){
  if(!confirm(`"${title}" silinecek. Emin misin?`))return;
  await api(`game_genres?game_id=eq.${id}`,'DELETE');
  await api(`game_platforms?game_id=eq.${id}`,'DELETE');
  await api(`games?id=eq.${id}`,'DELETE');
  loadList();
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  event.target.classList.add('active');
  if(tab==='list')loadList();
}

init();
</script>
</body>
</html>
