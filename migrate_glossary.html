<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Glossary Migration</title>
<style>
body{font-family:monospace;background:#0a0e1a;color:#e8eaf0;padding:30px}
button{background:#ff4655;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:15px;cursor:pointer;margin:8px 4px}
button:disabled{background:#333;cursor:not-allowed}
#log{background:#131829;border:1px solid #2a3149;border-radius:8px;padding:20px;margin-top:20px;max-height:500px;overflow-y:auto;line-height:1.9}
.ok{color:#2ecc71}.err{color:#e74c3c}.info{color:#00d4ff}
</style>
</head>
<body>
<h2>📖 Glossary Migration</h2>
<p style="color:#8c93a8">Glossary terimlerini Supabase'e yükler. Bir kere çalıştır.</p>
<button onclick="run()">▶ Yükle</button>
<button onclick="clearTerms()" style="background:#1c2238;border:1px solid #2a3149">🗑 Temizle</button>
<div id="log"></div>
<script>
const SB='https://bniqmxbtvgwkaoswugds.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuaXFteGJ0dmd3a2Fvc3d1Z2RzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTExMTYsImV4cCI6MjA5MzQyNzExNn0.VXjnGv3uV8A2XfAW5jOBAkxyzc9c9q6adrA64JfwrQs';
const H={headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json'}};

const TERMS=[
  {term:'ROM',summary:'Read-Only Memory. Bir oyun kartuşunun dijital dökümü.',full_explanation:'ROM aslında "Read-Only Memory" — donanım dünyasında yazılamaz bellek. Eski oyunlar (NES, SNES, GBA, N64) fiziksel kartuşlarda ROM çiplerinde geliyordu. Bir oyunu emüle edebilmek için kartuşun byte-by-byte kopyası gerekir — buna ROM dosyası denir (.gba, .smc, .n64, .z64). Emülatör gerçek donanım gibi davranır: CPU bu ROM\'dan instruction\'ları okur, ekrana çizer. Disk tabanlı sistemler (PS1, PS2, GameCube) için ISO, CHD, BIN/CUE formatları kullanılır — mantıken aynı şey, fiziksel medyanın dijital fotokopisi.',category:'Donanım/Dosya'},
  {term:'BIOS',summary:'Donanım ile yazılım arasındaki köprü. Konsolu açan ilk kod.',full_explanation:'Basic Input/Output System. Konsolun içindeki flash chip\'te bulunan, cihaz açılınca ilk çalışan firmware. Donanımı initialize eder, oyunu kontrol eder, controller okur. Bazı emülatörler (PS1, PS2, GBA, Dreamcast) gerçek BIOS dump\'ı olmadan çalışmaz — çünkü oyun kodu BIOS\'un sistem fonksiyonlarını çağırır. İki yaklaşım var: HLE (High-Level Emulation) — BIOS çağrılarını fake eder, hızlı ama uyumsuzluk riski var. LLE (Low-Level Emulation) — gerçek BIOS\'u çalıştırır, doğru ama kendi konsolundan dump etmen gerekir.',category:'Donanım/Firmware'},
  {term:'Emulation',summary:'Bir donanımın yazılımla taklit edilmesi.',full_explanation:'PS2\'nin Emotion Engine CPU\'su ARM mimarisinde değil; Snapdragon 865 onu doğrudan çalıştıramaz. Emülatör arada translator görevi görür: PS2 MIPS instruction\'larını okur, ARM equivalent kodu üretir. İki ana yaklaşım: Interpreter — her instruction\'ı tek tek decode edip simüle eder (yavaş, basit) ve JIT/Recompiler — block\'ları bir kere ARM machine code\'a çevirir, cache\'ler, sonra direkt çalıştırır (hızlı, karmaşık). RP5\'teki AetherSX2, PPSSPP, Dolphin hepsi JIT kullanır. JIT olmasa modern handheld\'lerde PS2 emülasyonu mümkün olmazdı.',category:'Yazılım Konsepti'},
  {term:'Frontend',summary:'Birden fazla emülatörü tek UI\'dan yöneten launcher.',full_explanation:'Tek tek 30 emülatör çalıştırmak istemezsin. Frontend bunu çözer: tüm sistemin ROM\'larını listeler, kapakları gösterir, doğru emülatörü doğru oyunla eşleştirir. RetroArch, Daijisho, ES-DE, Pegasus en popüler frontend\'ler. İki çalışma şekli: libretro core\'larını yükleme (emülatörler shared library olarak — RetroArch yaklaşımı) veya standalone emülatörleri intent ile launch etme (Daijisho yaklaşımı: bu ROM için PPSSPP\'yi aç).',category:'UI/Yazılım'},
  {term:'Core',summary:'Frontend içinde çalışan emülatör modülü (özellikle RetroArch\'ta).',full_explanation:'RetroArch dünyasında "core" = libretro API ile yazılmış emülatör shared library\'si (.so, .dll). Örnek: mgba_libretro.so GBA core\'u, pcsx_rearmed PS1 core\'u. RetroArch sadece frontend — emülasyon mantığını core\'lar yapar. libretro API standardize edilmiş interface sağlar: input, video, audio, save state callback\'leri. Core yazarı sadece bu interface\'i implement eder, RetroArch geriye kalan her şeyi halleder.',category:'Yazılım Mimarisi'},
  {term:'Standalone Emulator',summary:'Bağımsız çalışan, kendi UI\'ı olan emülatör.',full_explanation:'Core\'un tersi. PPSSPP, AetherSX2, Dolphin, DuckStation standalone. Kendi başına çalışan uygulama, kendi ayar menüsü, kendi UI\'ı var. Genelde core versiyonundan daha performanslı ve güncel — çünkü geliştirici doğrudan o platforma optimize ediyor. RetroArch\'a core olarak da yüklenebilirler ama en iyi deneyim için standalone tercih edilir. Daijisho frontend\'i oyunu açarken standalone\'u intent ile launch eder.',category:'Yazılım'},
  {term:'Save State',summary:'Tüm RAM/CPU durumunu disk\'e snapshot olarak kaydetme.',full_explanation:'Save state, oyunun kendi Save menüsünden bağımsız olarak emülatörün o anki tüm sistem durumunu (RAM, CPU register\'ları, GPU state, audio buffer) disk\'e yazmasi. VM snapshot\'ı gibi düşün. Emülatör tüm emulated RAM\'ı (PS2 için 32MB), CPU state\'ini, GPU state\'ini compress edip .state dosyasına yazar. Birden fazla slot tutar — birkaç farklı noktaya dönebilirsin. Orijinal konsollar memory card\'la sadece oyunun izin verdiği yerde save ederdi; emülatör bu kısıtlamayı tamamen ortadan kaldırır.',category:'Yazılım Özelliği'},
  {term:'Dump',summary:'Fiziksel medyadan dijital kopya çıkarma işlemi.',full_explanation:'Bir kartuştan veya disk\'ten ROM/ISO dosyasını üretmek. Özel donanımla (kartuş okuyucu, modded konsol) fiziksel medyayı byte-by-byte okuyup dosyaya yazmak. ROM dosyası fiziksel medyanın 1:1 kopyası olmalı — sıkıştırmasız, modifiye edilmemiş, aksi halde checksum doğrulaması başarısız olur. GBA için Joey\'s GBA Dumper, GameCube için CleanRip, PS1 için cdrdao kullanılır.',category:'İşlem'},
  {term:'NTSC / PAL',summary:'Bölgesel video sinyali standartları. NTSC 60Hz (ABD/Japonya), PAL 50Hz (Avrupa).',full_explanation:'NTSC ve PAL, analog televizyon standartları. NTSC: ABD/Japonya/Kore (60Hz, 480i). PAL: Avrupa/Avustralya (50Hz, 576i). Kritik fark: PAL versiyonu bir oyun, NTSC\'den %17 daha yavaş çalışır. Geliştiriciler lazy port yaptıysa oyun fiziksel olarak yavaşlatılmıştır — Mario ve Sonic\'in PAL versiyonları bu yüzden kötü ünlüdür. Emülasyonda her zaman NTSC versiyonunu tercih et: USA veya JPN etiketli ROM dosyaları.',category:'Standart'},
  {term:'Overclock',summary:'CPU/GPU\'yu varsayılan üstü hızda çalıştırma.',full_explanation:'Donanım çipinin clock speed\'ini varsayılan değerin üzerine çıkarmak. RP5\'in Snapdragon 865\'i stock 2.84 GHz. Vapor chamber cooling ile daha yüksek clock\'larda stabil çalışabilir. Emülasyon CPU-bound olduğu için her ekstra MHz değerli — God of War 2 gibi marjinal PS2 oyunları overclock ile 60 FPS\'e ulaşabilir. Trade-off: ısı artışı, batarya ömrü azalması, uzun vadede çip yorgunluğu.',category:'Performans'},
  {term:'JIT (Recompiler)',summary:'Just-In-Time: kaynak instruction\'ları runtime\'da hedef CPU koduna derler.',full_explanation:'Emülatör performansının kalbi. Naive interpreter her instruction\'ı switch-case ile simüle eder — çok yavaş. JIT recompiler ise basic block\'ları (örn: 50 instruction\'lık bir loop) bir defaya mahsus ARM machine code\'a çevirir, executable memory\'ye yazar, cache\'ler. Sonraki çağırmalarda direkt native kod çalışır. Performans farkı 10x-50x olabilir. JavaScript\'teki V8 engine ve Java\'daki HotSpot JVM ile tamamen aynı mantık. AetherSX2, PPSSPP, Dolphin\'in kalbinde JIT vardır.',category:'Yazılım Mimarisi'},
  {term:'Scraping',summary:'ROM\'lara metadata ve kapak görseli otomatik bağlama.',full_explanation:'Frontend\'in scraper modülü, ROM dosyasını online veritabanlarına (Screenscraper, TheGamesDB, IGDB) sorgular. ROM\'un MD5/SHA1 hash\'ini hesaplayıp match eder; hash hit yoksa dosya ismine fuzzy search yapar. Kapak resmi, açıklama, çıkış yılı, tür metadata\'sını indirir ve kütüphanene bağlar. Skraper (PC tool) en güçlü araçlardan biri — PC\'de scrape edip RP5\'e sync etmek en iyi pratik.',category:'Frontend Özelliği'},
];

function log(msg,cls=''){document.getElementById('log').innerHTML+=`<div class="${cls}">${msg}</div>`;document.getElementById('log').scrollTop=9999;}

async function run(){
  document.querySelector('button').disabled=true;
  log('🚀 Glossary yükleniyor...','info');
  for(const t of TERMS){
    try{
      const r=await fetch(`${SB}/rest/v1/glossary`,{method:'POST',...H,body:JSON.stringify([t])});
      if(r.ok)log(`✓ ${t.term}`,'ok');
      else{const e=await r.text();log(`✗ ${t.term}: ${e}`,'err');}
    }catch(e){log(`✗ ${t.term}: ${e.message}`,'err');}
    await new Promise(r=>setTimeout(r,100));
  }
  log('✅ Tamamlandı!','ok');
  document.querySelector('button').disabled=false;
}

async function clearTerms(){
  if(!confirm('Tüm glossary temizlensin mi?'))return;
  await fetch(`${SB}/rest/v1/glossary?id=gt.0`,{method:'DELETE',...H});
  log('🗑 Temizlendi','info');
}
</script>
</body>
</html>
