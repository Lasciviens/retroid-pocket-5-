function log(m,c=''){const el=document.getElementById('log');el.innerHTML+=`<div class="${c}">${m}</div>`;el.scrollTop=9999;}

async function api(ep,method='GET',body=null){
  const opts={...H,method};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(`${SB}/rest/v1/${ep}`,opts);
  const t=await r.text();
  return t?JSON.parse(t):null;
}

// ── Lookup maps ──────────────────────────────────────────────
async function getMaps(){
  const [sys,gen,ser,emu]=await Promise.all([
    api('systems?select=id,name'),
    api('genres?select=id,name'),
    api('series?select=id,name'),
    api('emulators?select=id,name'),
  ]);
  const sysMap={},genMap={},serMap={},emuMap={};
  sys.forEach(s=>sysMap[s.name]=s.id);
  gen.forEach(g=>genMap[g.name]=g.id);
  ser.forEach(s=>serMap[s.name]=s.id);
  emu.forEach(e=>emuMap[e.name]=e.id);
  return{sysMap,genMap,serMap,emuMap};
}

// ── Çalıştırma fonksiyonları ─────────────────────────────────
async function runGames(){
  log('<b>🎮 Yeni oyunlar ekleniyor...</b>','info');
  const {sysMap,genMap,serMap,emuMap}=await getMaps();

  // PC sistemini yoksa ekle
  if(!sysMap['PC']){
    const [s]=await api('systems','POST',[{name:'PC',full_name:'Personal Computer',manufacturer:'Various',generation:null,release_year:null}]);
    sysMap['PC']=s.id;
    log('✓ PC sistemi eklendi','ok');
  }
  // Winlator emülatörünü yoksa ekle
  if(!emuMap['Winlator']){
    const [e]=await api('emulators','POST',[{name:'Winlator',type:'standalone',supported_systems:['PC'],notes:'Windows emulator for Android. Requires Turnip Mesa driver.'}]);
    emuMap['Winlator']=e.id;
    log('✓ Winlator emülatörü eklendi','ok');
  }
  // Need for Speed seri yoksa ekle
  if(!serMap['Need for Speed']){
    const [s]=await api('series','POST',[{name:'Need for Speed',description:'EA racing series'}]);
    serMap['Need for Speed']=s.id;
    log('✓ Need for Speed serisi eklendi','ok');
  }

  // Mevcut oyunları kontrol et
  const existing=await api('games?select=title');
  const existingTitles=new Set((existing||[]).map(g=>g.title.toLowerCase()));

  let added=0,skipped=0;
  for(const g of NEW_GAMES){
    if(existingTitles.has(g.title.toLowerCase())){
      log(`⏭ Zaten var: ${g.title}`,'warn');
      skipped++;
      continue;
    }
    try{
      const [game]=await api('games','POST',[{
        title:g.title,
        series_id:g.series?serMap[g.series]||null:null,
        release_year:g.year,
        description:g.desc,
        is_coop:g.coop||false,
        coop_notes:g.coopNotes||null,
        is_iconic:g.iconic||false,
        rating:g.rating||null,
        play_status:'backlog'
      }]);
      // Genres
      const gids=g.genres.map(gn=>genMap[gn]).filter(Boolean);
      if(gids.length)await api('game_genres','POST',gids.map(gid=>({game_id:game.id,genre_id:gid})));
      // Platforms
      for(const p of g.platforms){
        const sysId=sysMap[p.system];
        const emuId=emuMap[p.emulator]||null;
        if(!sysId){log(`  ⚠ Sistem bulunamadı: ${p.system}`,'warn');continue;}
        await api('game_platforms','POST',[{
          game_id:game.id,system_id:sysId,emulator_id:emuId,
          performance:p.perf,performance_notes:p.perfNotes,
          cover_url:p.cover||null,region:'USA'
        }]);
      }
      log(`✓ Eklendi: ${g.title}`,'ok');
      added++;
    }catch(e){log(`✗ Hata: ${g.title} — ${e.message}`,'err');}
    await new Promise(r=>setTimeout(r,100));
  }
  log(`<b>Tamamlandı: ${added} eklendi, ${skipped} atlandı</b>`,added>0?'ok':'warn');
}

async function runPerfNotes(){
  log('<b>⚙️ Perf notları güncelleniyor...</b>','info');
  for(const u of PERF_UPDATES){
    // game bul
    const games=await api(`games?select=id,title,game_platforms(id)&title=ilike.*${encodeURIComponent(u.title)}*`);
    if(!games||!games.length){log(`⚠ Bulunamadı: ${u.title}`,'warn');continue;}
    const game=games[0];
    if(!game.game_platforms?.length){log(`⚠ Platform yok: ${u.title}`,'warn');continue;}
    for(const p of game.game_platforms){
      await api(`game_platforms?id=eq.${p.id}`,'PATCH',{performance_notes:u.perfNotes});
    }
    log(`✓ Güncellendi: ${game.title}`,'ok');
    await new Promise(r=>setTimeout(r,80));
  }
  log('<b>Perf notları tamamlandı</b>','ok');
}

async function runTips(){
  log('<b>💡 Bilgi kupürleri ekleniyor...</b>','info');
  for(const t of TIPS){
    // Duplicate kontrolü
    const ex=await api(`notes?title=ilike.*${encodeURIComponent(t.title.replace(/[🏆🔵📱🎮⬆️]/g,'').trim())}*`);
    if(ex&&ex.length){log(`⏭ Zaten var: ${t.title}`,'warn');continue;}
    await api('notes','POST',[{title:t.title,content:t.content,category:t.category}]);
    log(`✓ Eklendi: ${t.title}`,'ok');
    await new Promise(r=>setTimeout(r,80));
  }
  log('<b>Bilgi kupürleri tamamlandı</b>','ok');
}

async function runAll(){
  document.querySelectorAll('button').forEach(b=>b.disabled=true);
  await runGames();
  await runPerfNotes();
  await runTips();
  document.querySelectorAll('button').forEach(b=>b.disabled=false);
  log('<b>✅ TÜM İŞLEMLER TAMAMLANDI</b>','ok');
}
