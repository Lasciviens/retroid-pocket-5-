function log(msg, cls = '') {
  const div = document.getElementById('log');
  div.innerHTML += `<div class="${cls}">${msg}</div>`;
  div.scrollTop = div.scrollHeight;
}

async function migrate() {
  document.getElementById('btn').disabled = true;
  log('🚀 Migration başlıyor... ' + games.length + ' oyun yüklenecek.', 'info');

  // Batch insert - 20'lik gruplar halinde
  const batchSize = 20;
  let success = 0;
  let fail = 0;

  for (let i = 0; i < games.length; i += batchSize) {
    const batch = games.slice(i, i + batchSize);
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/games`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(batch)
      });

      if (res.ok) {
        success += batch.length;
        log(`✓ Batch ${Math.floor(i/batchSize)+1}: ${batch.map(g => g.name).join(', ')}`, 'ok');
      } else {
        const err = await res.text();
        fail += batch.length;
        log(`✗ Batch ${Math.floor(i/batchSize)+1} HATA: ${err}`, 'err');
      }
    } catch(e) {
      fail += batch.length;
      log(`✗ Network hatası: ${e.message}`, 'err');
    }

    await new Promise(r => setTimeout(r, 200)); // rate limit
  }

  log('', '');
  log(`✅ Migration tamamlandı: ${success} başarılı, ${fail} hatalı`, success > 0 ? 'ok' : 'err');
  if (success > 0) {
    log('🎉 Artık dashboard Supabase\'den okuyacak!', 'info');
  }
}
